const _EXERCISE_INFO_LOWER = Object.fromEntries(Object.entries(EXERCISE_INFO).map(([k,v]) => [k.toLowerCase().trim(), v]));
// Stop-words stripped before token matching
const _EX_STOP = new Set(['the','a','an','and','or','on','in','at','to','of','for','with','by','from','as','per','arm','side','knee','bench','db','dumbbell','barbell','kb','single','double','bilateral','weighted','tempo','varied','grip','standing','seated']);
function _exTokens(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t => t.length > 1 && !_EX_STOP.has(t));
}
function getExerciseInfo(name) {
  if (!name) return null;
  // Exact match first
  if (EXERCISE_INFO[name]) return EXERCISE_INFO[name];
  const s = String(name).toLowerCase().trim();
  if (_EXERCISE_INFO_LOWER[s]) return _EXERCISE_INFO_LOWER[s];
  // Token overlap fuzzy match
  const qTokens = _exTokens(name);
  if (!qTokens.length) return null;
  let bestScore = 0, bestVal = null;
  for (const [key, val] of Object.entries(EXERCISE_INFO)) {
    const kTokens = _exTokens(key);
    if (!kTokens.length) continue;
    const matches = qTokens.filter(t => kTokens.some(k => k.includes(t) || t.includes(k))).length;
    // Score = matched tokens / max(query, key) token count — penalises large mismatches
    const score = matches / Math.max(qTokens.length, kTokens.length);
    if (score > bestScore) { bestScore = score; bestVal = val; }
  }
  return bestScore >= 0.4 ? bestVal : null;
}

function showExerciseInfo(name) {
  const info = getExerciseInfo(name);
  if (!info) return;
  const hasHold = info.hold && !info.hold.startsWith('No hold');
  const holdClass = hasHold ? 'ex-info-hold' : 'ex-info-section';
  const holdLabel = hasHold ? 'Embedded Breath Hold' : 'Breath Hold';
  const holdLines = info.hold.split('\n').map(l => `<div>${esc(l)}</div>`).join('');
  const div = document.createElement('div');
  div.className = 'confirm-overlay';
  div.innerHTML = `<div class="ex-info-box">
    <h3>${esc(name)}</h3>
    <div class="ex-info-meta">
      <span class="ex-info-chip">${esc(info.day)}</span>
      <span class="ex-info-chip">${esc(info.sets)}</span>
      <span class="ex-info-chip">Rest: ${esc(info.rest)}</span>
    </div>
    <div class="ex-info-section">
      <div class="ex-info-label">Execution</div>
      <div class="ex-info-text">${esc(info.cues)}</div>
    </div>
    <div class="${holdClass}">
      <div class="ex-info-label">${holdLabel}</div>
      <div class="ex-info-text">${holdLines}</div>
    </div>
    <div class="confirm-btns" style="margin-top:6px">
      <button class="btn-confirm" onclick="this.closest('.confirm-overlay').remove()">Got it</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  div.addEventListener('click', e => { if (e.target === div) div.remove(); });
}

function summarizeSets(sets) {
  const ws = sets.map(s=>s.weight).filter(w => w !== '' && w !== null && w !== undefined && Number.isFinite(Number(w)));

  const parts = [];
  if (ws.length) parts.push(Math.max(...ws)+'lbs');
  if (rs.length) parts.push(rs.join('/')+ ' reps');

function fmtMSS(val) {
  if (val === '' || val === null || val === undefined) return '';
  // If already M:SS format, return as-is
  if (typeof val === 'string' && /^\d+:\d{2}$/.test(val.trim())) return val.trim();
  const n = Number(val);
  if (!Number.isFinite(n) || n < 0) return String(val);
  const m = Math.floor(n / 60), s = Math.round(n % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function parseMSS(str) {
  if (str === '' || str === null || str === undefined) return '';
  const s = String(str).trim();
  // M:SS or MM:SS — seconds must be 0–59
  const mss = s.match(/^(\d+):(\d{1,2})$/);
  if (mss) {
    const sec = parseInt(mss[2]);
    if (sec > 59) return null; // invalid — signals bad input to caller
    return parseInt(mss[1]) * 60 + sec;
  }
  // Raw seconds (plain number)
  const n = parseFloat(s);
  return Number.isFinite(n) && n >= 0 ? n : '';
}

function aInp(di, roundKey, field, label, saved, type, imode) {

  const im = imode ? ` inputmode="${imode}"` : (isTime ? ' inputmode="numeric"' : '');
  return `<div class="apnea-inp"><label>${label}</label>` +

    `data-apnea-day="${di}" data-apnea-round="${roundKey}" data-apnea-field="${field}" data-apnea-time="${isTime?'1':''}"></div>`;
}

// Returns { [roundKey]: [ { wk, val } ] } for a given day type across all weeks.
// dayType: 'push' | 'pull' | 'legs' | 'pool'
// field: 'actual_hold' | 'actual_dur'
function getApneaHistory(dayType, roundKeys, field) {
  const data = load();
  const result = {};
  roundKeys.forEach(rk => { result[rk] = []; });

  const sorted = Object.keys(data.weeks).sort();
  for (const wk of sorted) {
    const wData = data.weeks[wk];
    if (!wData?.apnea_logs || !wData?.plan?.days) continue;
    // Find the day index matching the type
    wData.plan.days.forEach((day, di) => {
      const lc = day.name.toLowerCase();
      const matches = dayType === 'push'     ? lc.includes('push')
                    : dayType === 'pull'     ? lc.includes('pull')
                    : dayType === 'legs'     ? lc.includes('leg')
                    : dayType === 'pool'     ? lc.includes('pool')
                    : false;
      if (!matches) return;
      const log = wData.apnea_logs[di] || {};
      roundKeys.forEach(rk => {
        const raw = log[rk]?.[field];
        const sec = parseMSS(raw);
        if (sec !== '' && Number.isFinite(Number(sec)) && Number(sec) > 0) {
          result[rk].push({ wk, val: Number(sec) });
        }
      });
    });
  }
  return result;
}

function renderApneaSparkline(points, accentColor) {
  if (points.length < 2) {
    return `<svg width="100%" height="44" viewBox="0 0 120 44"><text x="60" y="26" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.2)">Need 2+ sessions</text></svg>`;
  }
  const vals = points.map(p => p.val);
  const rawMax = Math.max(...vals), rawMin = Math.min(...vals);
  const pad = (rawMax - rawMin) * 0.15 || rawMax * 0.1 || 3;
  const yMax = rawMax + pad, yMin = Math.max(0, rawMin - pad);
  const W = 120, H = 44, lp = 2, rp = 2, tp = 6, bp = 6;
  const ph = H - tp - bp, pw = W - lp - rp;
  const n = points.length;
  const xOf = i => lp + (n === 1 ? pw / 2 : i * pw / (n - 1));
  const yOf = v => tp + (yMax === yMin ? ph / 2 : (yMax - v) / (yMax - yMin) * ph);

  const pts = points.map((p, i) => `${xOf(i).toFixed(1)},${yOf(p.val).toFixed(1)}`).join(' ');
  const maxVal = Math.max(...vals);
  const maxIdx = vals.indexOf(maxVal);
  const circles = points.map((p, i) => {
    const x = xOf(i).toFixed(1), y = yOf(p.val).toFixed(1);
    const isBest = p.val === maxVal && i === maxIdx;
    return `<circle cx="${x}" cy="${y}" r="${isBest ? 3.5 : 2}" fill="${isBest ? accentColor : 'rgba(255,255,255,.35)'}"/>`;
  }).join('');

  return `<svg width="100%" height="44" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${pts}" stroke="${accentColor}" stroke-width="1.5" fill="none" stroke-opacity=".7"/>
    ${circles}
  </svg>`;
}

function renderApneaPanel(title, accentColor, history, roundLabels, tableHeader) {
  const hasAny = Object.values(history).some(arr => arr.length > 0);
  const body = hasAny ? (() => {
    // Charts row
    const cards = Object.entries(history).map(([rk, pts], idx) => {
      const label = roundLabels[idx] || rk;
      const best = pts.length ? Math.max(...pts.map(p => p.val)) : null;
      const bestWk = best !== null ? pts.find(p => p.val === best)?.wk : null;
      const bestStr = best !== null ? fmtMSS(best) : '—';
      const wkStr = bestWk ? weekLabel(bestWk) : '';
      return `<div class="aa-chart-card">
        <div class="aa-chart-label">${esc(label)}</div>
        ${renderApneaSparkline(pts, accentColor)}
        <div class="aa-chart-best" style="color:${accentColor}">${esc(bestStr)}</div>
        <div class="aa-chart-week">${esc(wkStr)}</div>
      </div>`;
    }).join('');

    // Best-ever table
    const rows = Object.entries(history).map(([rk, pts], idx) => {
      if (!pts.length) return '';
      const label = roundLabels[idx] || rk;
      const best = Math.max(...pts.map(p => p.val));
      const bestWk = pts.find(p => p.val === best)?.wk;
      const sessions = pts.length;
      const recent = pts[pts.length - 1];
      const recentStr = fmtMSS(recent.val);
      const trend = pts.length >= 2
        ? (pts[pts.length-1].val > pts[pts.length-2].val ? '▲' : pts[pts.length-1].val < pts[pts.length-2].val ? '▼' : '—')
        : '—';
      const trendColor = trend === '▲' ? 'var(--easy)' : trend === '▼' ? 'var(--hard)' : 'var(--muted)';
      return `<tr>
        <td>${esc(label)}</td>
        <td class="aa-best">${esc(fmtMSS(best))}</td>
        <td>${esc(weekLabel(bestWk))}</td>
        <td>${esc(recentStr)}</td>
        <td style="color:${trendColor};font-weight:700">${trend}</td>
        <td style="color:var(--muted)">${sessions}</td>
      </tr>`;
    }).filter(Boolean).join('');

    return `<div class="aa-charts">${cards}</div>
      <table class="aa-table">
        <thead><tr><th>${tableHeader}</th><th>Best</th><th>Week</th><th>Last</th><th>Trend</th><th>#</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  })() : `<div class="aa-empty">No data logged yet for this block.</div>`;

  return `<div class="aa-panel aa-collapsed">
    <div class="aa-panel-header" onclick="this.closest('.aa-panel').classList.toggle('aa-collapsed')">
      <span class="aa-panel-title" style="color:${accentColor}">${esc(title)}</span>
      <span class="aa-panel-chevron">›</span>
    </div>
    <div class="aa-panel-body">${body}</div>
  </div>`;
}

function renderApneaAnalytics() {
  const co2Keys  = ['r0','r1','r2','r3','r4','r5'];
  const walkKeys = ['r0','r1','r2','r3','r4','r5'];
  const wallKeys = ['r0','r1','r2','r3','r4','r5'];
  const staticKeys = ['static_0','static_1','static_2'];

  const co2History   = getApneaHistory('push', co2Keys,   'actual_hold');
  const walkHistory  = getApneaHistory('pull', walkKeys,  'actual_dur');
  const wallHistory  = getApneaHistory('legs', wallKeys,  'actual_hold');
  const staticHistory = getApneaHistory('pool', staticKeys, 'actual_hold');

  const co2Labels    = ['Round 1','Round 2','Round 3','Round 4','Round 5','Round 6'];
  const walkLabels   = ['Walk 1','Walk 2','Walk 3','Walk 4','Walk 5','Walk 6'];
  const wallLabels   = ['Round 1','Round 2','Round 3','Round 4','Round 5','Round 6'];
  const staticLabels = ['Primer 1','Primer 2','Max Attempt'];

  const panels = [
    renderApneaPanel('CO2 Table — Push',       '#00A1E0', co2History,    co2Labels,    'Round'),
    renderApneaPanel('Walking Apnea — Pull',   '#22c55e', walkHistory,   walkLabels,   'Walk'),
    renderApneaPanel('Wall-Sit Holds — Legs',  '#f59e0b', wallHistory,   wallLabels,   'Round'),
    renderApneaPanel('Static Apnea — Pool',    '#a78bfa', staticHistory, staticLabels, 'Hold'),
  ].join('');

  const hasAnyData = [co2History, walkHistory, wallHistory, staticHistory]
    .some(h => Object.values(h).some(arr => arr.length > 0));

  if (!hasAnyData) {
    return `<div class="empty-state">No apnea data logged yet.<br>Complete apnea blocks in your workouts to see trends here.</div>`;
  }

  return `<div class="apnea-analytics">${panels}</div>`;
}

  { key: 'staticApnea',    label: 'Static Apnea',             unit: 'sec',  isTime: true,  higherIsBetter: true,  placeholder: 'e.g. 2:36' },
  { key: 'walkingApnea',   label: 'Walking Apnea',            unit: 'sec',  isTime: true,  higherIsBetter: true,  placeholder: 'e.g. 1:25' },
  { key: 'pullUps',        label: 'Pull-Ups',                 unit: 'reps', isTime: false, higherIsBetter: true,  placeholder: 'e.g. 19'   },
  { key: 'postPullUpHold', label: 'Post-Pull-Up Exhale Hold', unit: 'sec',  isTime: true,  higherIsBetter: true,  placeholder: 'e.g. 0:35' },
  { key: 'pushUps',        label: 'Push-Ups',                 unit: 'reps', isTime: false, higherIsBetter: true,  placeholder: 'e.g. 75'   },
  { key: 'bssL',           label: 'BSS — Left leg',           unit: 'reps', isTime: false, higherIsBetter: true,  placeholder: 'e.g. 19'   },
  { key: 'bssR',           label: 'BSS — Right leg',          unit: 'reps', isTime: false, higherIsBetter: true,  placeholder: 'e.g. 19'   },
  { key: 'postSquatHold',  label: 'Post-Squat Exhale Hold',   unit: 'sec',  isTime: true,  higherIsBetter: true,  placeholder: 'e.g. 0:25' },
  { key: 'echoBike',       label: 'Echo Bike 5-min',          unit: 'cal',  isTime: false, higherIsBetter: true,  placeholder: 'e.g. 70'   },
];

const FT_TARGETS = {
  staticApnea:    { baseline: '2:36',      m1: '2:45–2:55', m3: '3:20+' },
  walkingApnea:   { baseline: '1:25*',     m1: '1:50–2:00', m3: '2:15–2:25' },
  pullUps:        { baseline: '19',        m1: '20–21',     m3: '24+' },
  postPullUpHold: { baseline: '35 sec',    m1: '40–45 sec', m3: '55+ sec' },
  pushUps:        { baseline: '75',        m1: '77–79',     m3: '85+' },
  bss:            { baseline: 'L19 / R19', m1: 'L21 / R21', m3: 'L25+ / R25+' },
  postSquatHold:  { baseline: '25 sec',    m1: '30–35 sec', m3: '45+ sec' },
  echoBike:       { baseline: '70 cal',    m1: '73–75 cal', m3: '80+ cal' },
};

// Numeric thresholds for progress bar rendering. Values are the minimum to reach that tier.
// Time metrics in seconds. bss is combined (L+R).
const FT_TARGET_VALS = {
  staticApnea:    { baseline: 156, m1: 165, m3: 200 },
  walkingApnea:   { baseline: 85,  m1: 110, m3: 135 },
  pullUps:        { baseline: 19,  m1: 20,  m3: 24  },
  postPullUpHold: { baseline: 35,  m1: 40,  m3: 55  },
  pushUps:        { baseline: 75,  m1: 77,  m3: 85  },
  bss:            { baseline: 38,  m1: 42,  m3: 50  }, // combined L+R
  postSquatHold:  { baseline: 25,  m1: 30,  m3: 45  },
  echoBike:       { baseline: 70,  m1: 73,  m3: 80  },
};

function ftFormatVal(key, val) {
  if (val === '' || val === null || val === undefined) return '—';
  const n = Number(val);
  if (!Number.isFinite(n)) return '—';
  if (key === 'staticApnea' || key === 'walkingApnea' || key === 'postPullUpHold' || key === 'postSquatHold') {
    const m = Math.floor(n / 60), s = n % 60;
    return m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}s`;
  }
  return String(n);
}

function ftGetPRs(records) {
  // Returns { key: prValue } across all records
  // BSS PR = max(bssL + bssR) combined; store the index of the PR record
  const prs = {};
  FT_METRICS.forEach(m => {
    let best = null;
    records.forEach(r => {
      const v = Number(r.results?.[m.key]);
      if (!Number.isFinite(v)) return;
      if (best === null || (m.higherIsBetter ? v > best : v < best)) best = v;
    });
    prs[m.key] = best;
  });
  // BSS combined PR
  let bestBss = null;
  records.forEach(r => {
    const l = Number(r.results?.bssL), rr = Number(r.results?.bssR);
    if (!Number.isFinite(l) || !Number.isFinite(rr)) return;
    const combined = l + rr;
    if (bestBss === null || combined > bestBss) bestBss = combined;
  });
  prs._bssCombined = bestBss;
  return prs;
}

function ftDelta(key, val, prVal) {
  const v = Number(val), p = Number(prVal);
  if (!Number.isFinite(v) || !Number.isFinite(p) || v === p) return '';
  const diff = v - p;
  const sign = diff > 0 ? '+' : '';
  const cls = diff > 0 ? 'ft-delta-pos' : 'ft-delta-neg';
  if (key === 'staticApnea' || key === 'walkingApnea' || key === 'postPullUpHold' || key === 'postSquatHold') {
    const absDiff = Math.abs(diff);
    const m = Math.floor(absDiff / 60), s = absDiff % 60;
    const fmtDiff = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}s`;
    return `<span class="${cls}">${diff > 0 ? '+' : '-'}${fmtDiff}</span>`;
  }
  return `<span class="${cls}">${sign}${diff}</span>`;
}

function renderFitnessTests() {
  const records = loadFitness(); // newest first
  const prs = ftGetPRs(records);

  // Entry form
  const fields = FT_METRICS.map(m => {
    if (m.key === 'bssL' || m.key === 'bssR') {
      // Render both L and R side by side — handled together below
    }
    return null;
  });
  // Build fields grid — group bssL+bssR together
  let fieldHtml = `<div class="ft-field ft-date-field"><label>Date</label><input type="date" id="ft-date" value="${new Date().toISOString().slice(0,10)}"></div>`;
  let i = 0;
  while (i < FT_METRICS.length) {
    const m = FT_METRICS[i];
    if (m.key === 'bssL') {
      const mR = FT_METRICS[i+1];
      fieldHtml += `<div class="ft-field"><label>${esc(m.label)}</label><input type="number" inputmode="numeric" id="ft-${m.key}" placeholder="${m.placeholder}"></div>`;
      fieldHtml += `<div class="ft-field"><label>${esc(mR.label)}</label><input type="number" inputmode="numeric" id="ft-${mR.key}" placeholder="${mR.placeholder}"></div>`;
      i += 2;
    } else if (m.isTime) {
      fieldHtml += `<div class="ft-field"><label>${esc(m.label)}</label><input type="text" inputmode="numeric" id="ft-${m.key}" placeholder="${m.placeholder}"></div>`;
      i++;
    } else {
      fieldHtml += `<div class="ft-field"><label>${esc(m.label)}</label><input type="number" inputmode="numeric" id="ft-${m.key}" placeholder="${m.placeholder}"></div>`;
      i++;
    }
  }

  // Target progress cards
  const progressCards = [
    { label: 'Static Apnea',             key: 'staticApnea',    prKey: 'staticApnea',    isTime: true  },
    { label: 'Walking Apnea',            key: 'walkingApnea',   prKey: 'walkingApnea',   isTime: true  },
    { label: 'Pull-Ups',                 key: 'pullUps',        prKey: 'pullUps',        isTime: false },
    { label: 'Post-Pull-Up Hold',        key: 'postPullUpHold', prKey: 'postPullUpHold', isTime: true  },
    { label: 'Push-Ups',                 key: 'pushUps',        prKey: 'pushUps',        isTime: false },
    { label: 'BSS (L+R combined)',       key: 'bss',            prKey: '_bssCombined',   isTime: false },
    { label: 'Post-Squat Hold',          key: 'postSquatHold',  prKey: 'postSquatHold',  isTime: true  },
    { label: 'Echo Bike 5-min',          key: 'echoBike',       prKey: 'echoBike',       isTime: false },
  ].map(({ label, key, prKey, isTime }) => {
    const tv = FT_TARGET_VALS[key];
    const t  = FT_TARGETS[key];
    const prVal = prs[prKey];
    const hasPR = prVal !== null && prVal !== undefined && Number.isFinite(Number(prVal));
    const cur = hasPR ? Number(prVal) : null;

    // Determine tier reached
    let tier = 'none', tierLabel = 'Not yet', tierCls = 'ft-tier-none';
    if (cur !== null) {
      if (cur >= tv.m3)       { tier = 'm3';       tierLabel = 'Month 3';  tierCls = 'ft-tier-m3'; }
      else if (cur >= tv.m1)  { tier = 'm1';       tierLabel = 'Month 1';  tierCls = 'ft-tier-m1'; }
      else if (cur >= tv.baseline) { tier = 'baseline'; tierLabel = 'Baseline'; tierCls = 'ft-tier-baseline'; }
    }

    // Progress bar: 0% = 0, 33% = baseline, 66% = m1, 100% = m3
    let pct = 0, barColor = 'var(--dim)';
    if (cur !== null) {
      if (cur >= tv.m3) {
        pct = 100; barColor = 'var(--gold-hi)';
      } else if (cur >= tv.m1) {
        pct = 66 + (cur - tv.m1) / (tv.m3 - tv.m1) * 34;
        barColor = 'var(--accent)';
      } else if (cur >= tv.baseline) {
        pct = 33 + (cur - tv.baseline) / (tv.m1 - tv.baseline) * 33;
        barColor = 'var(--accent)';
      } else {
        pct = Math.max(2, cur / tv.baseline * 33);
        barColor = 'var(--muted)';
      }
    }

    // Next milestone
    let nextStr = '';
    if (cur !== null && cur < tv.m3) {
      const nextVal = tier === 'm1' ? tv.m3 : tier === 'baseline' ? tv.m1 : tv.baseline;
      const nextName = tier === 'm1' ? 'Month 3' : tier === 'baseline' ? 'Month 1' : 'Baseline';
      const gap = nextVal - cur;
      const gapStr = isTime ? fmtMSS(gap) : String(Math.ceil(gap));
      nextStr = `${gapStr} to ${nextName} (${isTime ? fmtMSS(nextVal) : nextVal})`;
    } else if (cur !== null) {
      nextStr = 'Month 3 goal reached!';
    }

    const curStr = cur !== null ? (isTime ? ftFormatVal(key, cur) : String(cur)) : '—';
    const curColor = tier === 'm3' ? 'var(--gold-hi)' : tier === 'm1' ? 'var(--accent)' : tier === 'baseline' ? 'var(--text)' : 'var(--muted)';

    return `<div class="ft-progress-card">
      <div class="ft-progress-label">${esc(label)}</div>
      <div class="ft-progress-bar-wrap"><div class="ft-progress-bar" style="width:${pct.toFixed(1)}%;background:${barColor}"></div></div>
      <div class="ft-progress-meta">
        <span class="ft-progress-current" style="color:${curColor}">${esc(curStr)}</span>
        <span class="ft-progress-tier ${tierCls}">${esc(tierLabel)}</span>
      </div>
      ${nextStr ? `<div class="ft-progress-next">${esc(nextStr)}</div>` : ''}
    </div>`;
  }).join('');

  const targetHtml = `<div class="ft-targets">
    <div class="ft-targets-title">Target Progress</div>
    <div class="ft-progress-row">${progressCards}</div>
    <div style="font-size:11px;color:var(--dim);margin-top:12px">Baseline · Month 1 · Month 3 — bar fills left to right. * Walking apnea baseline tested on fatigued legs.</div>
  </div>`;

  // Accordion — one card per test session
  const displayMetrics = [
    ...FT_METRICS.filter(m => m.key !== 'bssL' && m.key !== 'bssR'),
    { key: '_bss', label: 'BSS (L / R)', isTime: false }
  ];

  let tableHtml = '';
  if (records.length === 0) {
    tableHtml = `<div class="ft-empty">No tests recorded yet. Enter your first result above.</div>`;
  } else {
    tableHtml = records.map((rec, recIdx) => {
      const r = rec.results || {};
      const isOpen = openFtState.has(rec.date);
      const dateFmt = new Date(rec.date + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});

      // Build summary: count PRs in this session
      let prCount = 0;
      displayMetrics.forEach(m => {
        if (m.key === '_bss') {
          const bssL = Number(r.bssL), bssR = Number(r.bssR);
          const combined = (Number.isFinite(bssL) && Number.isFinite(bssR)) ? bssL + bssR : null;
          if (combined !== null && combined === prs._bssCombined) prCount++;
        } else {
          const vn = Number(r[m.key]);
          if (Number.isFinite(vn) && vn === prs[m.key]) prCount++;
        }
      });
      const summary = prCount > 0 ? `${prCount} PR${prCount > 1 ? 's' : ''}` : '';

      // Build metric rows for this session
      const metricRows = displayMetrics.map(m => {
        let val, isPR, prBadge, delta;
        if (m.key === '_bss') {
          const bssL = Number(r.bssL), bssR = Number(r.bssR);
          const combined = (Number.isFinite(bssL) && Number.isFinite(bssR)) ? bssL + bssR : null;
          isPR = combined !== null && combined === prs._bssCombined;
          val = (Number.isFinite(bssL) && Number.isFinite(bssR)) ? `${bssL}/${bssR}` : '—';
          prBadge = isPR ? `<span class="ft-pr-badge">PR</span>` : '';
          delta = (!isPR && combined !== null && prs._bssCombined !== null)
            ? (() => { const d = combined - prs._bssCombined; return `<span class="${d>0?'ft-delta-pos':'ft-delta-neg'}">${d>0?'+':''}${d}</span>`; })() : '';
        } else {
          const v = r[m.key];
          const vn = Number(v);
          isPR = Number.isFinite(vn) && vn === prs[m.key];
          val = ftFormatVal(m.key, v);
          prBadge = isPR ? `<span class="ft-pr-badge">PR</span>` : '';
          delta = !isPR && prs[m.key] !== null ? ftDelta(m.key, v, prs[m.key]) : '';
        }
        return `<tr>
          <td style="color:var(--text);font-size:12px;padding:6px 0 6px 0;width:55%">${esc(m.label)}</td>
          <td class="${isPR?'ft-pr':''}" style="text-align:right;padding:6px 0">${val}${prBadge}${delta ? ' '+delta : ''}</td>
        </tr>`;
      }).join('');

      return `<div class="ft-session${isOpen?' open':''}" id="fts-${esc(rec.date)}">
        <div class="ft-session-header" onclick="toggleFtSession('${esc(rec.date)}')">
          <span class="ft-session-date">${esc(dateFmt)}</span>
          ${summary ? `<span class="ft-session-summary">🏆 ${esc(summary)}</span>` : '<span class="ft-session-summary"></span>'}
          <span class="ft-session-chevron">›</span>
          <button class="ex-del-btn" onclick="event.stopPropagation();deleteFitnessRecord(${recIdx})" aria-label="Delete test result" data-tooltip="Delete" style="flex-shrink:0;margin-left:6px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
        </div>
        <div class="ft-session-body">
          <table class="ft-table" style="margin-top:4px"><tbody>${metricRows}</tbody></table>
        </div>
      </div>`;
    }).join('');
  }

  return `<div>
    <div class="ft-form">
      <div class="ft-form-title">Record New Test</div>
      <div class="ft-fields">${fieldHtml}</div>
      <div class="ft-form-btns">
        <button class="upload-btn" onclick="saveFitnessRecord()">Save Result</button>
      </div>
    </div>
    ${targetHtml}
    ${records.length ? `<div class="section-label">Test History</div>` : ''}
    ${tableHtml}
  </div>`;
}

function toggleFtSession(date) {
  const card = document.getElementById('fts-' + date);
  if (!card) return;
  const isOpen = card.classList.toggle('open');
  if (isOpen) openFtState.add(date);
  else openFtState.delete(date);
}

function saveFitnessRecord() {
  const date = document.getElementById('ft-date')?.value;
  if (!date) { toast('Please enter a date'); return; }
  const results = {};
  let anyValue = false;
  FT_METRICS.forEach(m => {
    const el = document.getElementById('ft-' + m.key);
    const v = el?.value.trim();
    const n = m.isTime ? parseMSS(v) : parseFloat(v);
    results[m.key] = (v && Number.isFinite(Number(n))) ? n : '';
    if (v && Number.isFinite(Number(n))) anyValue = true;
  });
  if (!anyValue) { toast('Enter at least one result'); return; }
  const records = loadFitness();
  records.push({ date, results });
  records.sort((a, b) => b.date.localeCompare(a.date)); // newest first
  saveFitness(records);
  toast('Test saved');
  renderApp();
}


function deleteFitnessRecord(idx) {
  showConfirm('Delete test result?', 'This cannot be undone.', () => {
    const records = loadFitness();
    records.splice(idx, 1);
    saveFitness(records);
    renderApp();
    toast('Deleted');
  }, 'Delete', true);
}

function weekDateRange(k) {
  const wd = getWeek(k);
  if (!wd?.plan?.days) return weekLabel(k);
  const logs = wd.logs || {};

  // Collect every timestamp from sets with valid reps
  let earliest = Infinity, latest = -Infinity;
  for (const sets of Object.values(logs)) {
    for (const s of sets) {
      const r = Number(s.reps);
      if (!Number.isFinite(r) || r <= 0 || !s.ts) continue;
      if (s.ts < earliest) earliest = s.ts;
      if (s.ts > latest)   latest   = s.ts;
    }
  }

  // Fall back to manually-set day.date values if no timestamps available
  if (earliest === Infinity) {
    const dates = wd.plan.days
      .map((day, di) => {
        const hasLog = day.exercises.some(ex => (logs[ex.id]||[]).some(s => Number(s.reps) > 0));
        return hasLog && day.date ? day.date : null;
      })
      .filter(Boolean)
      .sort();
    if (!dates.length) return weekLabel(k);
    const fmt = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
    return dates.length === 1 ? fmt(dates[0]) : `${fmt(dates[0])} – ${fmt(dates[dates.length - 1])}`;
  }

  const fmt = ts => new Date(ts).toLocaleDateString('en-US', {month:'short', day:'numeric'});
  const sameDay = new Date(earliest).toDateString() === new Date(latest).toDateString();
  return sameDay ? fmt(earliest) : `${fmt(earliest)} – ${fmt(latest)}`;
}

function renderHistory() {
  const weeks = allWeeks();
  if (!weeks.length) return '';
  const rows = weeks.map(k => {
    const wd = getWeek(k);
    const exCount = wd?.plan?.days?.reduce((s,d)=>s+d.exercises.length,0) || 0;
    const logCount = Object.values(wd?.logs||{}).reduce((s,sets)=>s+sets.filter(r=>r.reps!==''&&r.reps!==null&&r.reps!==undefined&&Number.isFinite(Number(r.reps))&&r.reps>0).length,0);
    const isCur = k === weekKey;
    const weekNote = wd?.note ? wd.note.trim() : '';
    return `<div class="hist-week${isCur?' hist-current':''}" onclick="jumpToWeek('${k}')">
      <div style="display:flex;flex-direction:column;gap:2px;min-width:0;flex:1">
        <span class="hist-label">${weekDateRange(k)}${isCur?' (current)':''}</span>
        <span class="hist-meta">${exCount ? exCount+' exercises' : 'No plan'}${logCount?' · '+logCount+' sets':''}</span>
        ${weekNote ? `<span class="hist-note">${esc(weekNote)}</span>` : ''}
      </div>
      <button class="hist-del" onclick="event.stopPropagation();handleDeleteWorkout('${k}')">Delete</button>
    </div>`;
  }).join('');
  return `<div class="history-section"><div class="section-label">All Weeks</div>${rows}</div>`;
}

function getExerciseTrend(exId) {
  const data = load();

  // Resolve the exercise name from the most recent week first so we always use
  // the current name, not a stale name from an old plan where the same position
  // held a completely different exercise.
  let exName = null;
  const sortedWks = Object.entries(data.weeks).sort((a,b) => b[0].localeCompare(a[0]));
  for (const [, wData] of sortedWks) {
    for (const day of wData.plan?.days || []) {
      const ex = day.exercises.find(e => e.id === exId);
      if (ex) { exName = ex.name; break; }
    }
    if (exName) break;
  }
  if (!exName) return [];

  const isSameExercise = name => !!name && _exMatch(exName, name);

  const ids = new Set();
  for (const wData of Object.values(data.weeks)) {
    for (const day of wData.plan?.days || []) {
      for (const ex of day.exercises) {
        if (isSameExercise(ex.name)) ids.add(ex.id);
      }
    }
  }

  // Scan all weeks, collect best weight per week, take the 8 most recent with data
  const allWeekKeys = Object.keys(data.weeks).sort();
  const weekPoints = [];
  for (const wk of allWeekKeys) {
    const logs = data.weeks[wk]?.logs || {};
    let best = 0;
    for (const id of ids) {
      for (const s of (logs[id] || [])) {
        const w = Number(s.weight), r = Number(s.reps);
        if (Number.isFinite(w) && w > 0 && Number.isFinite(r) && r > 0 && w > best) best = w;
      }
    }
    if (best > 0) {
      const d = new Date(wk + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      weekPoints.push({ weekKey: wk, label, bestWeight: best, hasData: true });
    }
  }

  // Return the 8 most recent data points
  return weekPoints.slice(-8);
}

function renderTrendChart(exId) {
  const pts = getExerciseTrend(exId);
  if (pts.length < 2) {
    return `<div style="padding:10px 0 14px;border-bottom:1px solid rgba(250,204,21,.15)"><div class="ex-trend-empty">Not enough data yet — log at least 2 weeks to see your trend</div></div>`;
  }
  const n = pts.length;
  const weights = pts.map(t => t.bestWeight);
  const rawMax = Math.max(...weights), rawMin = Math.min(...weights);
  const pad = (rawMax - rawMin) * 0.1 || rawMax * 0.1 || 5;
  const yMax = rawMax + pad, yMin = Math.max(0, rawMin - pad);
  const svgW = 280, svgH = 80, lp = 32, bp = 18, tp = 8;
  const ph = svgH - bp - tp;
  const pw = svgW - lp;
  const xOf = i => lp + (n === 1 ? pw / 2 : i * pw / (n - 1));
  const yOf = w => tp + (yMax === yMin ? ph / 2 : (yMax - w) / (yMax - yMin) * ph);

  let grid = '';
  [[yMax, rawMax], [(yMax + yMin) / 2, Math.round((rawMax + rawMin) / 2)], [yMin, rawMin]].forEach(([yv, lbl]) => {
    const y = yOf(yv).toFixed(1);
    grid += `<line x1="${lp}" y1="${y}" x2="${svgW}" y2="${y}" stroke="rgba(250,204,21,.08)" stroke-width="1"/>`;
    grid += `<text x="${lp - 3}" y="${(parseFloat(y) + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="rgba(250,204,21,.45)">${lbl}</text>`;
  });

  const polyPts = pts.map((t, i) => `${xOf(i).toFixed(1)},${yOf(t.bestWeight).toFixed(1)}`).join(' ');
  const polyline = `<polyline points="${polyPts}" stroke="rgba(250,204,21,.6)" stroke-width="1.5" fill="none"/>`;

  const maxW = Math.max(...weights);
  let circles = '';
  pts.forEach((t, i) => {
    const x = xOf(i).toFixed(1);
    const y = yOf(t.bestWeight).toFixed(1);
    circles += `<g><title>${t.bestWeight} lbs</title><circle cx="${x}" cy="${y}" r="3" fill="rgba(250,204,21,.9)"/></g>`;
    circles += `<text x="${x}" y="${svgH - 3}" text-anchor="middle" font-size="8" fill="rgba(250,204,21,.4)">${t.label}</text>`;
    if (t.bestWeight === maxW) {
      circles += `<text x="${x}" y="${(parseFloat(y) - 6).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(250,204,21,.8)">${t.bestWeight}</text>`;
    }
  });

  return `<div style="padding:10px 0 14px;border-bottom:1px solid rgba(250,204,21,.15);overflow:hidden"><svg width="100%" height="80" viewBox="0 0 280 80" preserveAspectRatio="xMidYMid meet" style="display:block">${grid}${polyline}${circles}</svg></div>`;
}

// Returns the most recent week's logged sets for an exercise, aggregated by effort tier.
// Returns { easy, moderate, hard } where each entry is { sets, reps } counts,
// or null if no previous data with effort logged exists.
function getEffortHistory(exName) {
  const data = load();
  const keys = Object.keys(data.weeks).sort().reverse();
  for (const key of keys) {
    if (key === weekKey) continue;
    const wData = data.weeks[key];
    if (!wData?.plan?.days) continue;
    let best = null;
    wData.plan.days.forEach((day, di) => {
      for (const ex of day.exercises) {
        if (!_exMatch(exName, ex.name)) continue;
        const sets = (wData.logs?.[ex.id] || []).filter(
          s => Number.isFinite(Number(s.reps)) && Number(s.reps) > 0
        );
        if (!sets.length) continue;
        if (!best || di > best.di) best = { sets, di };
      }
    });
    const allSets = best ? best.sets : [];
    if (!allSets.length) continue;
    if (!allSets.some(s => s.effort)) continue;
    const tiers = { easy: {sets:0, reps:0}, moderate: {sets:0, reps:0}, hard: {sets:0, reps:0} };
    allSets.forEach(s => {
      const t = tiers[s.effort];
      if (t) { t.sets++; t.reps += Number(s.reps) || 0; }
    });
    return { wk: key, tiers, totalSets: allSets.length };
  }
  return null;
}

// Returns a suggestion string like "→ 185 lbs × 8 reps" based on last week's
// effort + adjustment signals, or null if insufficient data.
function computeProgression(exName) {
  const prev = findPrevSets(exName);
  if (!prev?.length) return null;

  // Only consider sets with valid reps and at least effort or adjustment recorded
  const valid = prev.filter(s =>
    Number.isFinite(Number(s.reps)) && Number(s.reps) > 0 &&
    (s.effort || s.adjustment)
  );
  if (!valid.length) return null;

  // Tally the dominant adjustment and effort signals across all sets
  const adjCount = { increase: 0, same: 0, decrease: 0 };
  const effCount = { easy: 0, moderate: 0, hard: 0 };
  valid.forEach(s => {
    if (s.adjustment) adjCount[s.adjustment] = (adjCount[s.adjustment] || 0) + 1;
    if (s.effort)     effCount[s.effort]     = (effCount[s.effort]     || 0) + 1;
  });
  const adj = Object.entries(adjCount).sort((a,b) => b[1]-a[1])[0]?.[0];
  const eff = Object.entries(effCount).sort((a,b) => b[1]-a[1])[0]?.[0];

  // Use median weight and most common reps as the baseline
  const weights = valid.map(s => Number(s.weight) || 0).filter(w => w > 0).sort((a,b) => a-b);
  const repsArr  = valid.map(s => Number(s.reps)).filter(r => r > 0).sort((a,b) => a-b);
  if (!weights.length || !repsArr.length) return null;

  const baseWeight = weights[Math.floor(weights.length / 2)];
  const baseReps   = repsArr[Math.floor(repsArr.length / 2)];
  const increment  = baseWeight < 50 ? 2.5 : 5;

  let sugWeight = baseWeight;
  let sugReps   = baseReps;
  let reason    = '';

  if (adj === 'increase') {
    sugWeight = baseWeight + increment;
    reason = '↑ increase';
  } else if (adj === 'decrease') {
    sugWeight = Math.max(0, baseWeight - increment);
    reason = '↓ decrease';
  } else {
    // same adjustment — use effort to guide reps
    if (eff === 'easy')     { sugReps = baseReps + 2; reason = '= same · easy'; }
    else if (eff === 'hard') { reason = '= same · hard'; }
    else                     { sugReps = baseReps + 1; reason = '= same · moderate'; }
  }

  const weightStr = sugWeight > 0 ? `${sugWeight} lbs` : 'BW';
  return `${weightStr} × ${sugReps} reps`;
}

function findPrevSets(exName) {
  const data = load();
  for (const key of Object.keys(data.weeks).sort().reverse()) {
    if (key === weekKey) continue;
    const week = data.weeks[key];
    if (!week?.plan?.days) continue;
    let best = null;
    week.plan.days.forEach((day, di) => {
      for (const e of day.exercises) {
        if (!_exMatch(exName, e.name)) continue;
        const sets = (week.logs?.[e.id] || []).filter(
          s => s.reps !== '' && s.reps !== null && s.reps !== undefined && Number.isFinite(Number(s.reps)) && Number(s.reps) > 0
        );
        if (!sets.length) continue;
        if (!best || di > best.di) best = { sets, di };
      }
    });
    if (best) return best.sets;
  }
  return null;
}

function autoPopulateSets(di, exId) {
  const wd = getWeek(weekKey);
  const day = wd?.plan?.days?.[di];
  if (!day) return;
  const ex = day.exercises.find(e => e.id === exId);
  if (!ex) return;
  const targetSets = parseInt(ex.sets);
  if (!Number.isFinite(targetSets) || targetSets <= 0) return;
  const existingSets = wd.logs?.[exId] || [];
  const hasLoggedSets = existingSets.some(
    s => s.reps !== '' && s.reps !== null && s.reps !== undefined && Number.isFinite(Number(s.reps)) && Number(s.reps) > 0
  );
  if (hasLoggedSets) return;
  if (existingSets.length > 0) return; // already populated (e.g. by fill button) — don't clobber
  const prevSetsFound = findPrevSets(ex.name);
  const setsToCreate = prevSetsFound ? prevSetsFound.length : targetSets;
  for (let i = 0; i < setsToCreate; i++) {
    const prev = prevSetsFound?.[i];
    addSetLog(weekKey, exId, {
      weight:     prev?.weight     ?? '',
      reps:       prev?.reps       ?? '',
      effort:     prev?.effort     || '',
      adjustment: prev?.adjustment || '',
      ts: Date.now()
    });
  }
  const updatedWd = getWeek(weekKey);
  const sets = updatedWd.logs?.[exId] || [];
  const bwMode = getBWMode(exId);
  const list = document.getElementById('sl-' + exId);
  if (list) list.innerHTML = sets.map((s, i) => renderSet(exId, i, s, bwMode)).join('');
  refreshProgress();
  renderCalendar();
}

function startEditName(exId, nameEl) {
  const original = nameEl.textContent;
  const input = document.createElement('input');
  input.className = 'ex-name-input';

  input.autocomplete = 'off';
  input.setAttribute('autocorrect', 'off');
  input.setAttribute('autocapitalize', 'words');
  input.setAttribute('spellcheck', 'false');
  nameEl.replaceWith(input);
  input.focus();
  input.select();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    const newName = input.value.trim() || original;
    updateExerciseName(weekKey, exId, newName);
    const span = document.createElement('span');
    span.className = 'ex-name';
    span.textContent = newName;
    input.replaceWith(span);
  }
  function cancel() {
    committed = true;
    const span = document.createElement('span');
    span.className = 'ex-name';
    span.textContent = original;
    input.replaceWith(span);
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); cancel(); }
  });
}

function fmtDuration(ms) {
  const totalMin = Math.round(ms / 60000);
  if (totalMin < 1) return '<1 min';
  const h = Math.floor(totalMin / 60), m = totalMin % 60;
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}

function getDayDuration(di) {
  const wd = getWeek(weekKey);
  const day = wd?.plan?.days?.[di];
  if (!day?.completed || !day.completedAt) return null;
  const MAX_MS = 3 * 60 * 60 * 1000; // 3-hour cap — rejects stale placeholder timestamps
  // Prefer day.startedAt if stored correctly on the day object
  if (day.startedAt && day.startedAt < day.completedAt && (day.completedAt - day.startedAt) <= MAX_MS) {
    return fmtDuration(day.completedAt - day.startedAt);
  }
  // Fall back to earliest logged-set ts within the cap
  const logs = wd.logs || {};
  let earliest = day.completedAt;
  day.exercises.forEach(ex => {
    (logs[ex.id] || []).forEach(s => {
      const r = Number(s.reps);
      if (s.ts && s.ts < earliest && Number.isFinite(r) && r > 0 && (day.completedAt - s.ts) <= MAX_MS)
        earliest = s.ts;
    });
  });
  if (earliest >= day.completedAt) return null;
  return fmtDuration(day.completedAt - earliest);
}

function calc1RM(exId) {
  const sets = getWeek(weekKey)?.logs?.[exId] || [];
  let best = 0;
  for (const s of sets) {
    const w = Number(s.weight), r = Number(s.reps);
    if (!Number.isFinite(w) || w <= 0 || !Number.isFinite(r) || r <= 0) continue;
    const e = r === 1 ? w : w * (1 + r / 30); // Epley
    if (e > best) best = e;
  }
  return best > 0 ? Math.round(best) : 0;
}

function render1RM(exId) {
  const v = calc1RM(exId);
  return v > 0 ? `~${v} lbs 1RM` : '';
}

function refreshProgress() {
  const wd = getWeek(weekKey);
  if (!wd?.plan) return;
  const logs = wd.logs || {};
  wd.plan.days.forEach((d,i) => {
    const { logged, total } = daySetCounts(d, logs);
    const el = document.getElementById('prog'+i);
    if (el) el.textContent = `${logged}/${total} Sets`;
    const bar = document.getElementById('pb'+i);
    if (bar) bar.style.width = total ? Math.round(logged/total*100)+'%' : '0%';
    d.exercises.forEach(ex => {
      const rmEl = document.getElementById('1rm-' + ex.id);
      if (rmEl) rmEl.textContent = render1RM(ex.id);
    });
  });
  updateScrollBtn();
}

document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const wd = getWeek(weekKey);
  if (wd?.plan) {
    showConfirm(
      'Replace workout?',
      'This week already has a workout. Uploading a new file will replace the plan (logged sets are kept).',
      () => processFile(file)
    );
  } else {
    processFile(file);
  }
});

function processFile(file) {
  document.getElementById('main').innerHTML = `<div class="processing"><div class="spinner"></div><p>Reading file…</p></div>`;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const program = JSON.parse(e.target.result);
      const days = applyRotation(parseJSON(program));
      const exCount = days.reduce((s,d) => s + d.exercises.length, 0);
      savePlan(weekKey, {days}, '');
      if (days.length) uiFeedback();
      toast(days.length ? `Loaded ${days.length} day${days.length>1?'s':''}, ${exCount} exercises` : 'No exercises found — check JSON format');
      renderApp();
    } catch(err) {
      console.error(err);
      toast(err.message.startsWith('Unexpected') ? 'Invalid JSON — check file for syntax errors' : err.message);
      renderApp();
    }
  };
  reader.onerror = () => { toast('Could not read file'); renderApp(); };
  reader.readAsText(file);
}

function validateDayForComplete(di) {
  const wd = getWeek(weekKey);
  const day = wd?.plan?.days?.[di];
  if (!day) return [];
  const logs = wd.logs || {};
  const ordinal = n => n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : `${n}th`;
  const errors = [];
  day.exercises.forEach(ex => {
    const sets = logs[ex.id] || [];
    sets.forEach((s, i) => {
      const touched = s.weight !== '' || Number(s.reps) > 0 || s.effort !== '' || s.adjustment !== '';
      if (!touched) return;
      const label = `${ordinal(i + 1)} set of ${ex.name}`;
      if (s.weight === '' || s.weight === null || s.weight === undefined || !Number.isFinite(Number(s.weight)))
        errors.push(`Missing Weight for the ${label}`);
      if (!Number.isFinite(Number(s.reps)) || Number(s.reps) <= 0)
        errors.push(`Missing Reps for the ${label}`);
      if (!s.effort)
        errors.push(`Missing Effort Level for the ${label}`);
      if (!s.adjustment)
        errors.push(`Missing Next for the ${label}`);
    });
  });
  return errors;
}

// ── Cloud Sync ────────────────────────────────────────────
async function pushToCloud() {
  const pushBtn = document.querySelector('[onclick="pushToCloud()"]');
  const pullBtn = document.querySelector('[onclick="pullFromCloud()"]');
  const status  = document.getElementById('sync-status');
  if (pushBtn) pushBtn.disabled = true;
  if (pullBtn) pullBtn.disabled = true;
  if (status)  status.textContent = 'Pushing…';

  try {
    const payload = localStorage.getItem(STORE) || '{}';
    const response = await fetch(`${SUPABASE_URL}/rest/v1/workout_data?on_conflict=user_id`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({
        user_id: SUPABASE_USER,
        data: JSON.parse(payload),
        synced_at: new Date().toISOString()
      })
    });
    if (!response.ok) {
      const err = await response.text();
      throw new Error(`${response.status}: ${err}`);
    }
    const now = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    if (status) status.textContent = `Pushed ${now}`;
    uiFeedback();
    toast('Pushed to cloud ✓');
  } catch(err) {
    if (status) status.textContent = 'Push failed';
    toast(`Push failed: ${err.message}`);
  } finally {
    if (pushBtn) pushBtn.disabled = false;
    if (pullBtn) pullBtn.disabled = false;
  }
}

async function pullFromCloud() {
  const pushBtn = document.querySelector('[onclick="pushToCloud()"]');
  const pullBtn = document.querySelector('[onclick="pullFromCloud()"]');
  const status  = document.getElementById('sync-status');
  if (pushBtn) pushBtn.disabled = true;
  if (pullBtn) pullBtn.disabled = true;
  if (status)  status.textContent = 'Pulling…';

  try {
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/workout_data?user_id=eq.${SUPABASE_USER}&order=synced_at.desc&limit=1`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      }
    );
    if (!response.ok) {
      const err = await response.text();
      throw new Error(`${response.status}: ${err}`);
    }
    const rows = await response.json();
    if (!rows.length) {
      toast('No cloud data found — push from desktop first');
      if (status) status.textContent = 'Nothing to pull';
      return;
    }
    const cloudData = rows[0].data;
    const syncedAt  = new Date(rows[0].synced_at).toLocaleString('en-US', {
      month:'short', day:'numeric', hour:'numeric', minute:'2-digit'
    });
    showConfirm(
      'Replace local data?',
      `This will replace your local data with the cloud version last pushed on ${syncedAt}. Your current local data will be overwritten.`,
      () => {
        localStorage.setItem(STORE, JSON.stringify(cloudData));
        weekKey = toKey(new Date());
        syncCalToWeek();
        renderApp();
        uiFeedback();
        toast('Pulled from cloud ✓');
        if (status) status.textContent = `Pulled ${new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'})}`;
      },
      'Replace',
      true
    );
  } catch(err) {
    if (status) status.textContent = 'Pull failed';
    toast(`Pull failed: ${err.message}`);
  } finally {
    if (pushBtn) pushBtn.disabled = false;
    if (pullBtn) pullBtn.disabled = false;
  }
}

});

// If no plan for the current week, fall back to the most recent week that has one.
// This handles the case where a multi-day rotation spans past its week boundary
// (e.g. Day 7 lands on the Monday of the next week key).
(function fallbackToLatestWeek() {
  if (getWeek(weekKey)?.plan) return;
  const data = load();
  const latest = Object.keys(data.weeks)
    .filter(k => data.weeks[k]?.plan?.days?.length)
    .sort()
    .pop();
  if (latest) weekKey = latest;
})();
// One-time repair: fix stale placeholder ts values that produce bogus durations.
// For any completed day where earliest logged-set ts predates completedAt by >4h,
// reset those stale ts values to completedAt so duration is hidden rather than wrong.
(function repairStalePlaceholderTs() {
  const FOUR_HOURS = 4 * 60 * 60 * 1000;
  const data = load();
  let dirty = false;
  for (const wData of Object.values(data.weeks)) {
    if (!wData.plan?.days) continue;
    const logs = wData.logs || {};
    for (const day of wData.plan.days) {
      if (!day.completed || !day.completedAt) continue;
      for (const ex of day.exercises) {
        for (const s of (logs[ex.id] || [])) {
          const r = Number(s.reps);
          if (s.ts && Number.isFinite(r) && r > 0 && (day.completedAt - s.ts) > FOUR_HOURS) {
            s.ts = day.completedAt;
            dirty = true;
          }
        }
      }
    }
  }
  if (dirty) save(data);
})();

// One-time migration: re-key any week stored under a UTC-shifted date.
// toKey() previously used toISOString() (UTC), so users west of UTC had keys
// that were one day earlier than the actual local Monday. Re-key by parsing
// each stored key as noon local time and re-running toKey().
(function migrateWeekKeys() {
  const data = load();
  let dirty = false;
  const oldKeys = Object.keys(data.weeks);
  for (const oldKey of oldKeys) {
    const correctKey = toKey(new Date(oldKey + 'T12:00:00'));
    if (correctKey !== oldKey && !data.weeks[correctKey]) {
      data.weeks[correctKey] = data.weeks[oldKey];
      delete data.weeks[oldKey];
      dirty = true;
      console.log(`[key migration] ${oldKey} → ${correctKey}`);
    }
  }
  if (dirty) save(data);
})();

(function checkFitnessTestReminder() {
  const now   = new Date();
  const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  // Permanently dismissed for this month (user clicked "Take Fitness Test")
  if (localStorage.getItem('wt_ft_reminder') === month) return;

  // Snoozed for 24 hours via "Remind Me Later"
  const snooze = Number(localStorage.getItem('wt_ft_snooze') || 0);
  if (snooze && now.getTime() < snooze) return;

  const records = loadFitness();
  // Suppress if most recent test was within the last 30 days
  const latest = records.map(r => r.date).filter(Boolean).sort().pop();
  if (latest && (now.getTime() - new Date(latest + 'T12:00:00').getTime()) < 30 * 24 * 60 * 60 * 1000) return;

  const div = document.createElement('div');
  div.className = 'confirm-overlay';
  div.id = 'ft-reminder-modal';
  div.innerHTML = `<div class="confirm-box" style="max-width:360px">

    <div class="confirm-btns" style="flex-direction:column;gap:8px">
      <button class="btn-confirm" onclick="
        localStorage.setItem('wt_ft_reminder','${month}');

        document.getElementById('ft-reminder-modal').remove();
        switchMainTab('fitness');
      ">Take Fitness Test</button>
      <button class="btn-cancel" onclick="

  </div>`;
  document.body.appendChild(div);
})();

// ── Scroll button ─────────────────────────────────────────
function findScrollTarget() {
  // Walk all open day cards. For each, find the exercise with the most recent
  // completed set (reps > 0), then return the DOM element of the set immediately
  // after it. Falls back to the first open day card if nothing logged yet.
  const wd = getWeek(weekKey);
  if (!wd?.plan?.days) return null;
  const logs = wd.logs || {};
  let bestTs = -1, bestExId = null, bestIdx = -1;

  wd.plan.days.forEach((day, di) => {
    const card = document.getElementById('dc' + di);
    if (!card || !card.classList.contains('open')) return;
    day.exercises.forEach(ex => {
      const sets = logs[ex.id] || [];
      sets.forEach((s, i) => {
        const r = Number(s.reps);
        if (Number.isFinite(r) && r > 0 && (s.ts || 0) > bestTs) {
          bestTs = s.ts || 0;
          bestExId = ex.id;
          bestIdx = i;
        }
      });
    });
  });

  if (bestExId !== null) {
    // Target: the set row after the most recently completed set
    const nextEl = document.getElementById(`sr-${bestExId}-${bestIdx + 1}`);
    if (nextEl) return nextEl;
    // No next set — check for an open (expanded) apnea block in the same day card
    const exCard = document.getElementById('sl-' + bestExId)?.closest('.day-card');
    if (exCard) {
      const openApnea = exCard.querySelector('.apnea-block:not(.apnea-collapsed) .apnea-body');
      if (openApnea) return openApnea;
    }
    // Fall back to the Add Set button for that exercise
    const list = document.getElementById('sl-' + bestExId);
    if (list) return list.nextElementSibling; // add-set-btn
  }

  // Nothing logged — scroll to first open day card, or open apnea block
  const wd2 = getWeek(weekKey);
  if (!wd2?.plan?.days) return null;
  for (let di = 0; di < wd2.plan.days.length; di++) {
    const card = document.getElementById('dc' + di);
    if (!card?.classList.contains('open')) continue;
    const openApnea = card.querySelector('.apnea-block:not(.apnea-collapsed) .apnea-body');
    if (openApnea) return openApnea;
    return card;
  }
  return null;
}

function _getScrollY() {
  // On mobile the whole page scrolls (window); on desktop main scrolls
  const mainEl = document.getElementById('main');
  if (mainEl && mainEl.scrollHeight > mainEl.clientHeight && getComputedStyle(mainEl).overflowY !== 'visible') {
    return mainEl.scrollTop;
  }
  return window.scrollY;
}

function _scrollTo(el, top) {
  const mainEl = document.getElementById('main');
  const useMain = mainEl && mainEl.scrollHeight > mainEl.clientHeight && getComputedStyle(mainEl).overflowY !== 'visible';
  if (el !== undefined) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    if (useMain) mainEl.scrollTo({ top: 0, behavior: 'smooth' });
    else window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function handleScrollBtn() {
  if (_getScrollY() < 80) {
    // At top — scroll to current set target
    const target = findScrollTarget();
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    // Not at top — scroll to top
    _scrollTo();
  }
  updateScrollBtn();
}

function updateScrollBtn() {
  const btn = document.getElementById('scroll-btn');
  if (!btn) return;
  const atTop = _getScrollY() < 80;
  const hasTarget = !!findScrollTarget();
  // Show down-arrow when at top and there's somewhere to go; up-arrow otherwise
  const showDown = atTop && hasTarget;
  const visible  = !atTop || hasTarget;
  btn.classList.toggle('visible', visible);
  btn.innerHTML = showDown
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 12,15 18,9"/></svg>`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,15 12,9 18,15"/></svg>`;
  btn.setAttribute('aria-label', showDown ? 'Scroll to current set' : 'Scroll to top');
}

// Update button on scroll (both scroll containers)
document.getElementById('main').addEventListener('scroll', updateScrollBtn, { passive: true });
window.addEventListener('scroll', updateScrollBtn, { passive: true });

// Show data-tooltip on tap for touch devices (hover doesn't fire on iOS)
document.addEventListener('touchstart', function(e) {
  const btn = e.target.closest('[data-tooltip]');
  if (!btn) {
    document.querySelectorAll('.tooltip-visible').forEach(el => el.classList.remove('tooltip-visible'));
    return;
  }
  // cal-month-label has its own handler; skip here
  if (btn.classList.contains('cal-month-label')) return;
  const wasVisible = btn.classList.contains('tooltip-visible');
  document.querySelectorAll('.tooltip-visible').forEach(el => el.classList.remove('tooltip-visible'));
  if (!wasVisible) {
    btn.classList.add('tooltip-visible');
    setTimeout(() => btn.classList.remove('tooltip-visible'), 2000);
  }
}, {passive: true});
