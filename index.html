<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spearfishing Tracker</title>
<style>
:root {
  --bg: #0a0a0a;
  --s1: #141414;
  --s2: #1e1e1e;
  --border: #2a2a2a;
  --text: #ffffff;
  --muted: #c8c8c8;
  --dim: #909090;
  --accent: #00d4ff;
  --accent-dim: rgba(0,212,255,0.15);
  --push: #ff6b35;
  --pull: #4ecdc4;
  --legs: #ffe66d;
  --cardio: #95e1d3;
  --rest: #555555;
  --easy: #4caf50;
  --moderate: #ff9800;
  --hard: #f44336;
  --r: 12px;
  --rs: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 16px; overflow-x: hidden; }
button { background: none; border: none; cursor: pointer; color: inherit; font: inherit; }
input, textarea { background: var(--s2); border: 1px solid var(--border); border-radius: var(--rs); color: var(--text); font: inherit; outline: none; }
input:focus, textarea:focus { border-color: var(--accent); }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100;
  background: var(--s1); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
}
#header-left { display: flex; align-items: center; gap: 8px; min-width: 80px; }
#header-center { flex: 1; text-align: center; font-size: 14px; color: var(--text); }
#header-right { display: flex; align-items: center; gap: 8px; min-width: 80px; justify-content: flex-end; }
.hdr-btn {
  min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; border-radius: var(--rs); color: var(--text);
  transition: color 0.15s;
}
.hdr-btn:active { color: var(--text); }
#app-name { font-weight: 800; font-size: 17px; color: var(--text); letter-spacing: -0.3px; }
#back-btn { font-size: 22px; }
#workout-title { font-size: 14px; text-align: center; }
#workout-title .day-type-badge { font-weight: 800; }
.dur-edit-btn { color: var(--accent); cursor: pointer; white-space: nowrap; }
#sync-status { font-size: 12px; color: var(--text); }

/* ── Screens ── */
.screen { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow-y: auto; display: none; }
.screen.active { display: block; }

/* ── Calendar screen ── */
#cal-screen { padding: 4px; }
.cal-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.cal-tab {
  flex: 1; height: 44px; border-radius: var(--rs);
  background: var(--s1); border: 1px solid var(--border);
  font-weight: 600; font-size: 15px; color: var(--text);
  transition: all 0.15s;
}
.cal-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* Month grid */
#month-view { }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; }
.month-nav-btn { min-width: 44px; min-height: 44px; font-size: 20px; display: flex; align-items: center; justify-content: center; color: var(--text); }
.month-title { font-size: 18px; font-weight: 700; }
.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.dow-header { text-align: center; font-size: 11px; color: var(--text); padding: 4px 0; font-weight: 600; }
.cal-cell {
  background: var(--s1); border-radius: var(--rs);
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  position: relative; cursor: pointer; border: 2px solid rgba(255,255,255,0.25);
  min-height: 100px; padding: 7px 4px 4px; transition: border-color 0.15s; overflow: hidden;
}
/* Status-based outlines */
.cal-cell.today         { border-color: var(--accent); }
.cal-cell.completed     { border-color: var(--easy); }
.cal-cell.partial       { border-color: var(--moderate); }
.cal-cell.rest-day      { border-color: #38bdf8; background: rgba(56,189,248,0.08); }
.cal-cell.injured       { border-color: var(--hard); }
.cal-cell.fitness-day   { border-color: var(--legs); }
.cal-cell.other-month   { opacity: 0.3; }
.cal-cell .cal-date { font-size: 14px; font-weight: 700; line-height: 1; color: var(--text); }
.cal-cell .cal-info { display: flex; flex-direction: column; align-items: center; gap: 3px; margin-top: 4px; width: 100%; }
.cal-cell .cal-sets { font-size: 10px; font-weight: 700; color: var(--text); line-height: 1; text-align: center; }
.cal-cell .cal-dur  { font-size: 10px; color: var(--accent); line-height: 1; text-align: center; }
.cal-progress { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); }
.cal-progress-fill { height: 100%; border-radius: 0 0 var(--rs) var(--rs); transition: width 0.2s; }
/* Date color follows workout type label */
.cal-cell.has-push .cal-date    { color: var(--push); }
.cal-cell.has-pull .cal-date    { color: var(--pull); }
.cal-cell.has-legs .cal-date    { color: #ff6eb4; }
.cal-cell.has-cardio .cal-date  { color: var(--cardio); }
.cal-cell.has-rest .cal-date    { color: #38bdf8; }
.cal-cell.fitness-day .cal-date { color: var(--legs); }
.cal-type-label {
  font-size: 9px; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; margin-top: 3px; line-height: 1; text-align: center;
}
.type-text-push    { color: var(--push); }
.type-text-pull    { color: var(--pull); }
.type-text-legs    { color: #ff6eb4; }
.type-text-cardio  { color: var(--cardio); }
.type-text-rest    { color: var(--rest); }
.cal-cell .done-check { position: absolute; top: 3px; right: 4px; font-size: 10px; color: var(--easy); }

/* Week strip */
#week-view { }
.week-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.week-card {
  flex: 1; min-width: 80px; background: var(--s1); border-radius: var(--r);
  border: 1px solid var(--border); padding: 12px 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  min-height: 90px; transition: border-color 0.15s;
}
.week-card.today-card { border-color: var(--accent); }
.week-card .wc-dow { font-size: 11px; color: var(--text); font-weight: 600; }
.week-card .wc-date { font-size: 20px; font-weight: 800; }
.week-card .wc-badge {
  font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
  background: rgba(255,255,255,0.08);
}
.week-strip-nav { display: flex; justify-content: space-between; margin-bottom: 12px; }
.strip-nav-btn { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--text); border-radius: var(--rs); background: var(--s1); border: 1px solid var(--border); }

/* Type colors */
.type-push { color: var(--push); }
.type-pull { color: var(--pull); }
.type-legs { color: var(--legs); }
.type-cardio { color: var(--cardio); }
.type-rest { color: var(--rest); }
.bg-push { background: var(--push); }
.bg-pull { background: var(--pull); }
.bg-legs { background: var(--legs); }
.bg-cardio { background: var(--cardio); }
.bg-rest { background: var(--rest); }

/* Bottom sheet */
#type-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--s1); border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0; padding: 20px 16px 32px;
  transform: translateY(100%); transition: transform 0.25s ease;
}
#type-sheet.open { transform: translateY(0); }
#type-sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; text-align: center; }
.type-sheet-btns { display: flex; flex-direction: column; gap: 10px; }
.type-sheet-btn {
  height: 52px; border-radius: var(--r); font-size: 17px; font-weight: 800;
  color: #0a0a0a; border: none;
}
.tsb-push { background: var(--push); }
.tsb-pull { background: var(--pull); }
.tsb-legs { background: var(--legs); }
.tsb-cardio { background: var(--cardio); }
.tsb-rest    { background: var(--rest); color: var(--text); }
.tsb-fitness { background: var(--legs); color: #0a0a0a; }
#sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 199;
  display: none;
}
#sheet-backdrop.open { display: block; }

/* ── Workout screen ── */
#workout-screen { padding: 12px 12px 100px; }

/* Week notes */
.week-notes-wrap { margin-bottom: 12px; }
.week-notes-input {
  width: 100%; padding: 10px 12px; font-size: 14px;
  border-radius: var(--r); border: 1px solid var(--border);
  resize: none; height: 40px; transition: height 0.15s; line-height: 1.4;
  color: var(--text);
}
.week-notes-input:focus, .week-notes-input.has-content { height: 72px; color: var(--text); }
.week-notes-input::placeholder { color: var(--muted); }

/* Exercise card */
.ex-card {
  background: var(--s1); border-radius: var(--r); border: 1px solid var(--border);
  margin-bottom: 10px; overflow: hidden;
}
.ex-header {
  display: flex; align-items: center; padding: 14px 14px 14px 14px; gap: 10px; cursor: pointer;
  min-height: 56px;
}
.ex-name { font-size: 16px; font-weight: 700; flex: 1; }
.ex-info-btn { min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--accent); border-radius: 50%; background: var(--accent-dim); border: none; flex-shrink: 0; }
.ex-progress { font-size: 13px; color: var(--text); white-space: nowrap; }
.ex-card.ex-done .ex-progress { color: var(--easy); font-weight: 800; }
.ex-card.ex-done .ex-name { color: var(--easy); }
.ex-chevron { font-size: 18px; color: var(--text); transition: transform 0.2s; }
.ex-card.open .ex-chevron { transform: rotate(180deg); }
.ex-suggestion { font-size: 13px; color: var(--accent); padding: 0 14px 10px; font-style: italic; }
.ex-body { display: none; }
.ex-card.open .ex-body { display: block; }
.ex-target-line { font-size: 13px; font-weight: 700; color: var(--accent); padding: 8px 14px 4px; }
.ex-last-session { font-size: 12px; color: var(--text); padding: 0 14px 8px; }

/* Set rows */
.set-list { padding: 0 10px 10px; }
.set-row-wrap { position: relative; margin-bottom: 8px; }
.set-row {
  background: var(--s2); border-radius: var(--rs); padding: 10px 12px;
  border: 1px solid var(--border); position: relative; z-index: 1;
  transition: transform 0.2s ease;
}
.set-row-line1 { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.set-row-line2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.weight-input, .reps-input {
  width: 64px; height: 44px; text-align: center; font-size: 18px; font-weight: 700;
  border-radius: var(--rs); padding: 0 4px; border: 1px solid var(--muted);
}
.weight-input { width: 72px; }
.set-sep { font-size: 16px; color: var(--text); font-weight: 700; }
.bw-wrap { display: flex; align-items: center; gap: 4px; }
.bw-input, .bwa-input { width: 56px; height: 44px; text-align: center; font-size: 16px; font-weight: 700; border-radius: var(--rs); padding: 0 4px; border: 1px solid var(--muted); }
.bw-plus { font-size: 14px; color: var(--text); }
.pill-group { display: flex; gap: 4px; }
.pill {
  height: 32px; padding: 0 10px; border-radius: 20px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); background: var(--s1); color: var(--muted);
  transition: all 0.12s; display: flex; align-items: center;
}
.pill.active-easy { background: rgba(76,175,80,0.2); border-color: var(--easy); color: var(--easy); }
.pill.active-mod { background: rgba(255,152,0,0.2); border-color: var(--moderate); color: var(--moderate); }
.pill.active-hard { background: rgba(244,67,54,0.2); border-color: var(--hard); color: var(--hard); }
.pill.active-adj { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.note-toggle { height: 32px; width: 36px; border-radius: 20px; border: 1px solid var(--border); background: var(--s1); color: var(--text); font-size: 14px; display: flex; align-items: center; justify-content: center; }
.note-toggle.has-note { color: var(--accent); border-color: var(--accent); }
.note-input-wrap { padding: 6px 0 0; display: none; }
.note-input-wrap.open { display: block; }
.note-input { width: 100%; height: 36px; padding: 6px 10px; font-size: 13px; border-radius: var(--rs); }
.set-delete-btn {
  min-width: 36px; min-height: 36px; display: flex; align-items: center;
  justify-content: center; color: var(--hard); font-size: 18px;
  flex-shrink: 0; border-radius: var(--rs);
}
.add-set-btn {
  margin: 4px 10px 4px; height: 44px; width: calc(100% - 20px);
  border-radius: var(--rs); border: 1px dashed var(--border); background: none;
  color: var(--text); font-size: 14px; font-weight: 600;
}
.add-set-btn:active { background: var(--s2); }

/* Apnea block */
.apnea-block {
  background: var(--s1); border-radius: var(--r); border: 1px solid var(--border);
  margin-bottom: 10px; overflow: hidden;
}
.apnea-header {
  display: flex; align-items: center; padding: 14px; gap: 10px; cursor: pointer; min-height: 56px;
}
.apnea-title { font-size: 16px; font-weight: 700; flex: 1; }
.apnea-block.apnea-done .apnea-title { color: var(--easy); }
.apnea-chevron { font-size: 18px; color: var(--text); transition: transform 0.2s; }
.apnea-block.open .apnea-chevron { transform: rotate(180deg); }
.apnea-body { display: none; padding: 0 14px 14px; }
.apnea-block.open .apnea-body { display: block; }
.apnea-round { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.apnea-round:last-child { border-bottom: none; }
.apnea-round-label { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.apnea-target-line { font-size: 12px; color: var(--accent); margin-bottom: 8px; line-height: 1.5; }
.apnea-fields { display: flex; gap: 8px; flex-wrap: wrap; }
.apnea-field-wrap { display: flex; flex-direction: column; gap: 3px; }
.apnea-field-label { font-size: 11px; color: var(--text); font-weight: 600; }
.apnea-input { width: 80px; height: 40px; text-align: center; font-size: 15px; font-weight: 600; border-radius: var(--rs); padding: 0 4px; }
.apnea-note-input { width: 140px; height: 40px; font-size: 13px; padding: 0 8px; border-radius: var(--rs); }
.apnea-input.invalid { border-color: var(--hard); }

/* Mark complete btn */
#complete-btn {
  position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
  background: var(--s2); color: var(--text); font-size: 17px; font-weight: 800;
  border-radius: 0; z-index: 50; border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
  display: none;
}
#complete-btn.visible { display: flex; align-items: center; justify-content: center; }
#complete-btn.completed { background: var(--easy); color: #0a0a0a; border-top: none; }

/* ── Timer panel ── */
#timer-overlay {
  position: fixed; inset: 0; z-index: 300; display: none;
}
#timer-overlay.open { display: flex; }
#timer-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
#timer-panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: 80%;
  background: var(--s1); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#timer-header { display: flex; align-items: center; padding: 0 14px; height: 56px; border-bottom: 1px solid var(--border); gap: 10px; }
#timer-close { min-width: 44px; min-height: 44px; font-size: 22px; display: flex; align-items: center; justify-content: center; color: var(--text); }
#timer-tabs { display: flex; flex: 1; gap: 8px; }
.t-tab { flex: 1; height: 36px; border-radius: var(--rs); background: var(--s2); border: 1px solid var(--border); font-size: 14px; font-weight: 600; color: var(--text); }
.t-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.t-body { flex: 1; padding: 20px 16px; display: none; }
.t-body.active { display: flex; flex-direction: column; align-items: center; }
#sw-display { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; margin: 20px 0; }
#cd-display { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; margin: 20px 0; }
.timer-btns { display: flex; gap: 12px; justify-content: center; }
.t-btn {
  min-width: 80px; height: 52px; border-radius: 26px; font-size: 16px; font-weight: 700;
  background: var(--s2); border: 1px solid var(--border); color: var(--text);
}
.t-btn.primary { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
.cd-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
.cd-preset-wrap { position: relative; }
.cd-preset-btn {
  width: 100%; min-height: 80px; border-radius: var(--rs); font-size: 22px; font-weight: 800;
  background: var(--s2); border: 2px solid var(--border); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  -webkit-user-select: none; user-select: none;
}
.cd-preset-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.cd-preset-btn.hold-active { border-color: var(--hard); background: rgba(244,67,54,0.12); }
.cd-custom-wrap { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
.cd-custom-input { width: 80px; height: 44px; text-align: center; font-size: 16px; font-weight: 700; border-radius: var(--rs); }
.cd-set-btn { height: 44px; padding: 0 16px; border-radius: var(--rs); font-size: 14px; font-weight: 700; background: var(--s2); border: 1px solid var(--border); color: var(--text); }

/* ── Countdown pip (floats over workout screen when panel closed mid-countdown) ── */
#cd-pip {
  display: none; position: fixed; bottom: 76px; right: 16px; z-index: 200;
  background: var(--s1); border: 2px solid var(--accent); border-radius: 14px;
  padding: 10px 14px; flex-direction: row; align-items: center; gap: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
#cd-pip.visible { display: flex; }
#sw-pip {
  display: none; position: fixed; bottom: 136px; right: 16px; z-index: 200;
  background: var(--s1); border: 2px solid var(--accent); border-radius: 14px;
  padding: 10px 14px; flex-direction: row; align-items: center; gap: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
#sw-pip.visible { display: flex; }
#sw-pip-display {
  font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums;
  color: var(--accent); min-width: 60px; text-align: center;
}
#sw-pip-stop {
  min-width: 36px; height: 36px; border-radius: 18px; font-size: 16px;
  background: var(--s2); border: 1px solid var(--border); color: var(--text);
  display: flex; align-items: center; justify-content: center;
}
#cd-pip-display {
  font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums;
  color: var(--accent); min-width: 52px; text-align: center;
}
#cd-pip-stop {
  min-width: 36px; height: 36px; border-radius: 18px; font-size: 16px;
  background: var(--s2); border: 1px solid var(--border); color: var(--text);
  display: flex; align-items: center; justify-content: center;
}

/* ── Fitness screen ── */
#fitness-screen { padding: 12px 12px 40px; }
.fitness-form { background: var(--s1); border-radius: var(--r); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
.fitness-form h2 { font-size: 16px; font-weight: 800; margin-bottom: 14px; }
.ft-field { margin-bottom: 12px; }
.ft-field.ft-custom { display: flex; gap: 8px; align-items: flex-end; }
.ft-field.ft-custom .ft-input { flex: 1; }
.ft-label { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 4px; display: block; }
.ft-input { width: 100%; height: 44px; padding: 0 12px; font-size: 15px; border-radius: var(--rs); }
.ft-date-input { width: 100%; height: 44px; padding: 0 12px; font-size: 15px; border-radius: var(--rs); color-scheme: dark; }
.ft-save-btn {
  width: 100%; height: 52px; border-radius: var(--r); background: var(--accent);
  color: #0a0a0a; font-size: 16px; font-weight: 800; margin-top: 8px;
}
.ft-add-btn {
  width: 100%; height: 44px; border-radius: var(--rs); background: var(--s2);
  border: 1px dashed var(--border); color: var(--text); font-size: 14px; font-weight: 700; margin-top: 4px;
}
.ft-remove-btn {
  min-width: 36px; height: 44px; border-radius: var(--rs); background: transparent;
  border: none; color: var(--dim); font-size: 20px; padding: 0; flex-shrink: 0;
}
.ft-drag-handle {
  min-width: 28px; height: 44px; display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 18px; cursor: grab; touch-action: none; flex-shrink: 0;
}
.ft-field-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 14px; }
.ft-field-row.drag-over { border-top: 2px solid var(--accent); }
.ft-field-body { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.ft-row-actions { display: flex; flex-direction: column; gap: 4px; align-items: center; padding-top: 22px; }
.ft-info-btn { min-width: 32px; height: 32px; border-radius: 16px; background: transparent; border: 1px solid var(--border); color: var(--accent); font-size: 13px; display: flex; align-items: center; justify-content: center; }
.ft-notes-input { width: 100%; height: 36px; padding: 0 10px; font-size: 13px; border-radius: var(--rs); background: var(--s2); border: 1px solid var(--border); color: var(--text); }
.ft-notes-input::placeholder { color: var(--dim); }
.ft-sub-inputs { display: flex; gap: 6px; }
.ft-sub-inputs .ft-input { flex: 1; }
.ft-dur-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.ft-dur-label { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.ft-dur-val { font-size: 13px; color: var(--text); }
.ft-dur-edit { font-size: 13px; color: var(--accent); background: none; border: none; padding: 0; text-decoration: underline; }
#ft-info-modal { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); padding: 16px; }
#ft-info-modal.open { display: flex; }
#ft-info-modal .modal-box { max-height: 80vh; overflow-y: auto; }
.fitness-history h2 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
.ft-session {
  background: var(--s1); border-radius: var(--r); border: 1px solid var(--border);
  margin-bottom: 10px; overflow: hidden;
}
.ft-session-header {
  display: flex; align-items: center; padding: 14px; gap: 10px; cursor: pointer; min-height: 56px;
}
.ft-session-date { font-size: 16px; font-weight: 700; flex: 1; }
.ft-pr-badge { font-size: 11px; font-weight: 700; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); padding: 2px 8px; border-radius: 10px; }
.ft-session-chevron { font-size: 18px; color: var(--dim); transition: transform 0.2s; }
.ft-session-delete { min-width: 32px; height: 32px; border-radius: 16px; background: transparent; border: none; color: var(--dim); font-size: 16px; display: flex; align-items: center; justify-content: center; }
.ft-session.open .ft-session-chevron { transform: rotate(180deg); }
.ft-session-body { display: none; padding: 0 14px 14px; }
.ft-session.open .ft-session-body { display: block; }
.ft-metric-row { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.ft-metric-row:last-child { border-bottom: none; }
.ft-metric-name { font-size: 14px; color: var(--text); }
.ft-metric-sub { font-size: 11px; color: var(--text); text-align: right; line-height: 1.3; }
.ft-metric-val { font-size: 14px; font-weight: 700; text-align: right; color: var(--accent); }
.ft-trend { font-size: 16px; font-weight: 800; min-width: 18px; text-align: center; }
.ft-trend.up   { color: var(--easy); }
.ft-trend.down { color: var(--hard); }
.ft-trend.same { color: var(--text); }

/* ── Start modal ── */
#start-modal {
  position: fixed; inset: 0; z-index: 400; display: none;
  align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
}
#start-modal.open { display: flex; }
.modal-box { background: var(--s1); border-radius: var(--r); border: 1px solid var(--border); padding: 24px; width: calc(100% - 48px); max-width: 320px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.modal-body { font-size: 14px; color: var(--text); margin-bottom: 20px; line-height: 1.5; }
.modal-btns { display: flex; gap: 10px; }
.modal-btn { flex: 1; height: 48px; border-radius: var(--rs); font-size: 15px; font-weight: 700; border: 1px solid var(--border); background: var(--s2); }
.modal-btn.primary { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
.modal-btn.danger { background: var(--hard); color: #fff; border-color: var(--hard); }

/* Confirm modal */
#confirm-modal {
  position: fixed; inset: 0; z-index: 400; display: none;
  align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
}
#confirm-modal.open { display: flex; }

/* Validation modal */
#val-modal {
  position: fixed; inset: 0; z-index: 400; display: none;
  align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
}
#val-modal.open { display: flex; }
#val-modal .modal-box { max-height: 80vh; overflow-y: auto; }

/* Duration edit modal */
#dur-modal {
  position: fixed; inset: 0; z-index: 400; display: none;
  align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
}
#dur-modal.open { display: flex; }
.val-error-list { list-style: none; padding: 0; margin-bottom: 20px; }
.val-error-list li { font-size: 14px; color: var(--text); padding: 4px 0; border-bottom: 1px solid var(--border); }
.val-error-list li:last-child { border-bottom: none; }
.val-error-list li::before { content: "• "; color: var(--hard); }

/* Toast */
#toast {
  position: fixed; bottom: max(80px, calc(60px + env(safe-area-inset-bottom)));
  left: 50%; transform: translateX(-50%); z-index: 500;
  background: var(--s2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 20px; font-size: 14px; font-weight: 600; white-space: nowrap;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>

// ════════════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════════════
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    return JSON.parse(raw);
  } catch(e) {
    return defaultData();
  }
}

function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function defaultData() {
  return { sessions: {}, plan: null, bodyweight: 185, fitness_records: [], injured_days: {}, fitness_test_days: {} };
}

function countRealSetsInSession(session) {
  if (!session.exercises) return 0;
  return session.exercises.reduce((sum, ex) =>
    sum + (ex.sets || []).filter(isRealSet).length, 0);
}

function countPlannedSetsInSession(session) {
  if (!session.exercises) return 0;
  return session.exercises.reduce((sum, ex) =>
    sum + (parseInt(ex.plan_sets, 10) || (ex.sets || []).length), 0);
}

function sessionDurationMins(session) {
  if (!session.started_at || !session.completed_at) return null;
  const mins = Math.round((session.completed_at - session.started_at) / 60000);
  return mins > 0 ? mins : null;
}

let _calHoldStart = 0;
let _calHoldIso = null;
let _calHoldFired = false;

function calCellHoldStart(e, iso) {
  _calHoldStart = Date.now();
  _calHoldIso = iso;
  _calHoldFired = false;
}

function calCellHoldEnd(e) {
  const elapsed = Date.now() - _calHoldStart;
  if (elapsed >= 600 && _calHoldIso) {
    _calHoldFired = true;
    e.preventDefault(); // suppress the subsequent click event
    toggleInjury(_calHoldIso);
  }
  _calHoldIso = null;
}

function calCellHoldMove() {
  // Cancel hold if finger moves
  _calHoldIso = null;
  _calHoldStart = 0;
}

function calDayTapGuarded(iso) {
  // Suppress click if a long-press just fired
  if (_calHoldFired) { _calHoldFired = false; return; }
  calDayTap(iso);
}

function toggleInjury(iso) {
  const data = load();
  if (!data.injured_days) data.injured_days = {};
  if (data.injured_days[iso]) delete data.injured_days[iso];
  else data.injured_days[iso] = true;
  save(data);
  renderCalendar();
}

// ════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════
function isRealSet(s) {
  return Number(s.reps) > 0 && !s.prefilled;
}

function getSessionId(userId, date, type) {
  return `${userId}_${date}_${type}`;
}

function fmtMSS(seconds) {
  if (seconds === null || seconds === undefined || seconds === '') return '';
  const s = Number(seconds);
  if (!isFinite(s) || s < 0) return '';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}

function parseMSS(str) {
  if (!str || !str.trim()) return null;
  const parts = str.trim().split(':');
  if (parts.length !== 2) return null;
  const m = parseInt(parts[0], 10);
  const s = parseInt(parts[1], 10);
  if (isNaN(m) || isNaN(s) || s >= 60 || s < 0 || m < 0) return null;
  return m * 60 + s;
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateDisplay(isoDate) {
  if (!isoDate) return '';
  const [y, m, d] = isoDate.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function typeColor(type) {
  const map = { push: 'var(--push)', pull: 'var(--pull)', legs: 'var(--legs)', cardio: 'var(--cardio)', rest: 'var(--rest)' };
  return map[type] || 'var(--muted)';
}

function typeName(type) {
  if (!type) return '';
  return type.charAt(0).toUpperCase() + type.slice(1);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════════════════
// PLAN
// ════════════════════════════════════════════════════════════════
function getPlanDay(type, weekNumber) {
  const data = load();
  if (!data.plan || !data.plan.weeks) return null;
  const week = data.plan.weeks.find(w => w.week_number === weekNumber);
  if (!week) return null;
  return week.days.find(d => d.type === type) || null;
}

function getLastSession(type) {
  const data = load();
  const sessions = Object.values(data.sessions)
    .filter(s => s.day_type === type && s.date && s.exercises && s.exercises.length > 0)
    .sort((a, b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : 0));
  return sessions.length > 0 ? sessions[0] : null;
}

function prefillExercises(session, planDay) {
  const lastSession = getLastSession(session.day_type);
  const exercises = [];

  const planExercises = planDay && planDay.exercises ? planDay.exercises : [];

  for (const planEx of planExercises) {
    const numSets = parseInt(planEx.sets, 10) || 3;
    const sets = [];

    let prevWeight = '';
    if (lastSession) {
      const prevEx = lastSession.exercises.find(e => e.name === planEx.name);
      if (prevEx && prevEx.sets) {
        const realSets = prevEx.sets.filter(isRealSet);
        if (realSets.length > 0) {
          prevWeight = realSets[0].weight;
        }
      }
    }

    for (let i = 0; i < numSets; i++) {
      sets.push({
        weight: prevWeight !== '' ? prevWeight : '',
        reps: '',
        effort: '',
        adjustment: '',
        note: '',
        ts: null,
        prefilled: true,
      });
    }

    exercises.push({
      name: planEx.name,
      bw_mode: false,
      plan_sets: planEx.sets || '',
      plan_reps: planEx.reps || '',
      sets,
    });
  }

  return exercises;
}

function computeProgression(exName, dayType) {
  const lastSession = getLastSession(dayType);
  if (!lastSession) return null;
  const ex = lastSession.exercises.find(e => e.name === exName);
  if (!ex) return null;
  const realSets = ex.sets.filter(isRealSet);
  if (realSets.length === 0) return null;

  const lastWeight = realSets[0].weight;
  const efforts = realSets.map(s => s.effort).filter(Boolean);
  const adjs = realSets.map(s => s.adjustment).filter(Boolean);

  const dominantAdj = adjs.length > 0
    ? adjs.reduce((acc, v) => { acc[v] = (acc[v]||0)+1; return acc; }, {})
    : {};
  const dominantEffort = efforts.length > 0
    ? efforts.reduce((acc, v) => { acc[v] = (acc[v]||0)+1; return acc; }, {})
    : {};

  const topAdj = Object.entries(dominantAdj).sort((a,b) => b[1]-a[1])[0];
  const topEffort = Object.entries(dominantEffort).sort((a,b) => b[1]-a[1])[0];

  const adj = topAdj ? topAdj[0] : 'same';
  const effort = topEffort ? topEffort[0] : 'moderate';

  const repsArr = realSets.map(s => Number(s.reps)).filter(r => r > 0);
  const avgReps = repsArr.length > 0 ? Math.round(repsArr.reduce((a,b)=>a+b,0)/repsArr.length) : 0;

  let suggestWeight = lastWeight;
  let suggestReps = avgReps;

  if (adj === 'increase') {
    suggestWeight = lastWeight + (lastWeight < 50 ? 2.5 : 5);
  } else if (adj === 'decrease') {
    suggestWeight = Math.max(0, lastWeight - 5);
  } else {
    if (effort === 'easy') suggestReps = avgReps + 2;
    else if (effort === 'moderate') suggestReps = avgReps + 1;
  }

  if (suggestWeight === lastWeight && suggestReps === avgReps) return null;

  const weightStr = suggestWeight > 0 ? `${suggestWeight} lbs` : 'BW';
  return `→ ${weightStr} × ${suggestReps} reps`;
}

// ════════════════════════════════════════════════════════════════
// SYNC
// ════════════════════════════════════════════════════════════════
async function syncNow(silent) {
  if (syncInFlight) return;
  syncInFlight = true;
  if (!silent) setSyncStatus('Syncing…');

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?user_id=eq.${USER_ID}&select=session_id,data,updated_at`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
      }
    );
    if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
    const cloudRows = await res.json();

    const local = load();
    const upsertQueue = [];

    // Build cloud map
    const cloudMap = {};
    for (const row of cloudRows) {
      cloudMap[row.session_id] = row;
    }

    // Merge cloud → local
    for (const row of cloudRows) {
      const sid = row.session_id;
      const cloudUpdated = new Date(row.updated_at).getTime();

      if (sid === `${USER_ID}_plan`) {
        const localPlanUpdated = local.plan && local.plan._updated_at
          ? new Date(local.plan._updated_at).getTime() : 0;
        if (cloudUpdated > localPlanUpdated) {
          local.plan = { ...row.data, _updated_at: row.updated_at };
        }
      } else {
        const localSession = local.sessions[sid];
        // Always inject session_id and updated_at into the data object so
        // the app can find them after load() — cloud data may lack these.
        const normalized = { ...row.data, session_id: sid, updated_at: cloudUpdated };
        if (!localSession) {
          local.sessions[sid] = normalized;
        } else {
          const localUpdated = localSession.updated_at || 0;
          if (cloudUpdated > localUpdated) {
            local.sessions[sid] = normalized;
          }
        }
      }
    }

    // Queue local → cloud (sessions not in cloud or newer locally)
    for (const [sid, session] of Object.entries(local.sessions)) {
      const cloudRow = cloudMap[sid];
      const localUpdated = session.updated_at || 0;
      if (!cloudRow) {
        upsertQueue.push({ session_id: sid, data: session, updated_at: new Date(localUpdated || Date.now()).toISOString() });
      } else {
        const cloudUpdated = new Date(cloudRow.updated_at).getTime();
        if (localUpdated > cloudUpdated) {
          upsertQueue.push({ session_id: sid, data: session, updated_at: new Date(localUpdated).toISOString() });
        }
      }
    }

    // Write merged local state ONCE
    localStorage.setItem(STORAGE_KEY, JSON.stringify(local));

    // Upsert queued rows
    for (const item of upsertQueue) {
      await supabaseUpsert(item.session_id, item.data, item.updated_at);
    }

    const now = new Date();
    const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setSyncStatus(`Synced ${hhmm}`);

    // Re-render current screen
    if (currentScreen === 'calendar') renderCalendar();
    else if (currentScreen === 'workout' && currentSessionId) renderWorkout(currentSessionId);

  } catch(err) {
    setSyncStatus('Sync failed');
    if (!silent) toast('Sync failed: ' + err.message);
  } finally {
    syncInFlight = false;
  }
}

async function supabaseUpsert(sessionId, data, updatedAt) {
  const body = {
    user_id: USER_ID,
    session_id: sessionId,
    data,
    updated_at: updatedAt || new Date().toISOString(),
  };
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/${TABLE}?on_conflict=user_id,session_id`,
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify(body),
    }
  );
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Upsert failed for ${sessionId}: ${res.status} ${txt}`);
  }
}

}

// SESSION MANAGEMENT
// ════════════════════════════════════════════════════════════════
function getOrCreateSession(date, type) {
  const data = load();
  const baseId = getSessionId(USER_ID, date, type);

  // Check for existing session on this date+type (may have suffix)
  const matching = Object.keys(data.sessions).filter(sid => {
    const s = data.sessions[sid];
    return s.date === date && s.day_type === type;
  });
  if (matching.length > 0) return matching[0];

  // Create new
  const now = Date.now();
  const planDay = getPlanDay(type, getCurrentWeekNumber());
  const session = {
    session_id: baseId,
    user_id: USER_ID,
    day_type: type,
    date,
    completed: false,
    started_at: null,
    completed_at: null,
    week_notes: '',
    updated_at: now,
    exercises: [],
    apnea: {},
  };

  if (type !== 'rest' && type !== 'cardio') {
    session.exercises = prefillExercises(session, planDay);
  } else if (type === 'cardio') {
    const cardioDay = planDay;
    session.cardio_instructions = cardioDay && cardioDay.instructions ? cardioDay.instructions : '';
    session.apnea_rounds = 6;
  }

  data.sessions[baseId] = session;
  save(data);
  return baseId;
}

function getCurrentWeekNumber() {
  // Determine which plan week we're in based on current date
  // Week 4 starts ~2026-05-11, Week 5 starts ~2026-05-25 (rough heuristic)
  // Return 5 as current active week (Week 5 full volume)
  return 5;
}

function showScreen(name) {

}

// ════════════════════════════════════════════════════════════════
// CALENDAR SCREEN
// ════════════════════════════════════════════════════════════════
function switchCalTab(tab) {
  calTab = tab;
  document.querySelectorAll('.cal-tab').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'month') || (i === 1 && tab === 'week'));
  });
  document.getElementById('month-view').style.display = tab === 'month' ? '' : 'none';
  document.getElementById('week-view').style.display = tab === 'week' ? '' : 'none';
  renderCalendar();
}

function renderCalendar() {
  if (calTab === 'month') renderMonthView();
  else renderWeekView();
}

function renderMonthView() {
  const data = load();
  const today = todayISO();
  const [ty, tm] = today.split('-').map(Number);

  const year = calYear !== undefined ? calYear : ty;
  const month = calMonth !== undefined ? calMonth : tm - 1;
  calYear = year;
  calMonth = month;

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  let html = `<div class="month-nav">
    <button class="month-nav-btn" onclick="shiftMonth(-1)">‹</button>
    <span class="month-title">${monthNames[month]} ${year}</span>
    <button class="month-nav-btn" onclick="shiftMonth(1)">›</button>
  </div>
  <div class="month-grid">
    <div class="dow-header">Su</div><div class="dow-header">Mo</div>
    <div class="dow-header">Tu</div><div class="dow-header">We</div>
    <div class="dow-header">Th</div><div class="dow-header">Fr</div>
    <div class="dow-header">Sa</div>`;

  // Previous month tail
  for (let i = 0; i < firstDay; i++) {
    const d = daysInPrev - firstDay + i + 1;
    html += `<div class="cal-cell other-month"><span class="cal-date">${d}</span></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = iso === today;
    const session = findSessionForDate(data, iso);
    let dotHtml = '';
    const injured = (data.injured_days || {})[iso];
    const isFitnessDay = (data.fitness_test_days || {})[iso];
    const isRest = session && session.day_type === 'rest';
    const realCount = session ? countRealSetsInSession(session) : 0;
    const isComplete = session && session.completed;
    const isPartial = session && !session.completed && realCount > 0 && !isRest;

    let cellClass = 'cal-cell';
    if (session) cellClass += ` has-${session.day_type}`;
    if (isFitnessDay) cellClass += ' fitness-day';
    if (isToday) cellClass += ' today';
    if (injured) cellClass += ' injured';
    else if (isComplete) cellClass += ' completed';
    else if (isPartial) cellClass += ' partial';

    let typeLabel = '';
    if (isFitnessDay) typeLabel = `<span class="cal-type-label" style="color:var(--legs)">Fitness</span>`;
    else if (session && !isRest) typeLabel = `<span class="cal-type-label type-text-${session.day_type}">${typeName(session.day_type)}</span>`;

    // Sets + duration info for non-rest sessions; duration for fitness days
    let infoHtml = '';
    let progressBar = '';
    if (isFitnessDay) {
      const ftRec = (data.fitness_records || []).find(r => r.date === iso);
      if (ftRec && ftRec.started_at && ftRec.completed_at) {
        const mins = Math.round((ftRec.completed_at - ftRec.started_at) / 60000);
        if (mins > 0) infoHtml = `<div class="cal-info"><span class="cal-dur">${mins}m</span></div>`;
      }
    }
    if (session && !isRest && !isFitnessDay) {
      const planned = countPlannedSetsInSession(session);
      const setsStr = planned > 0 ? `${realCount}/${planned} sets` : (realCount > 0 ? `${realCount} sets` : '');
      const dur = sessionDurationMins(session);
      const durStr = dur ? `${dur}m` : '';
      if (setsStr || durStr) {
        infoHtml = `<div class="cal-info">
          ${setsStr ? `<span class="cal-sets">${setsStr}</span>` : ''}
          ${durStr  ? `<span class="cal-dur">${durStr}</span>` : ''}
        </div>`;
      }
      if (planned > 0) {
        const pct = Math.min(100, Math.round((realCount / planned) * 100));
        const fillColor = isComplete ? 'var(--easy)' : isPartial ? 'var(--moderate)' : 'var(--border)';
        progressBar = `<div class="cal-progress"><div class="cal-progress-fill" style="width:${pct}%;background:${fillColor}"></div></div>`;
      }
    }

    html += `<div class="${cellClass}"
      onclick="calDayTapGuarded('${iso}')"
      ontouchstart="calCellHoldStart(event,'${iso}')"
      ontouchend="calCellHoldEnd(event)"
      ontouchmove="calCellHoldMove()"
      oncontextmenu="event.preventDefault();toggleInjury('${iso}')"
    ><span class="cal-date">${d}</span>${typeLabel}${infoHtml}${progressBar}</div>`;
  }

  // Next month pad
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-cell other-month"><span class="cal-date">${i}</span></div>`;
  }

  html += '</div>';
  document.getElementById('month-view').innerHTML = html;
}

function renderWeekView() {
  const data = load();
  const today = todayISO();
  const todayDate = new Date(today + 'T00:00:00');
  const days = [];
  for (let i = -3 + weekStripOffset; i <= 3 + weekStripOffset; i++) {
    const d = new Date(todayDate);
    d.setDate(d.getDate() + i);
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    days.push({ iso, d });
  }

  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = `<div class="week-strip-nav">
    <button class="strip-nav-btn" onclick="shiftWeekStrip(-1)">‹</button>
    <button class="strip-nav-btn" onclick="shiftWeekStrip(1)">›</button>
  </div>
  <div class="week-strip">`;

  for (const { iso, d } of days) {
    const isToday = iso === today;
    const session = findSessionForDate(data, iso);
    let badgeHtml = '';
    let dateColor = 'var(--text)';
    if (session) {
      badgeHtml = `<span class="wc-badge type-${session.day_type}">${typeName(session.day_type)}</span>`;
      if      (session.completed)                     dateColor = 'var(--easy)';
      else if (countRealSetsInSession(session) > 0)   dateColor = 'var(--moderate)';
      else {
        const typeColors = { push:'var(--push)', pull:'var(--pull)', legs:'#ff6eb4', cardio:'var(--cardio)', rest:'#38bdf8' };
        dateColor = typeColors[session.day_type] || 'var(--text)';
      }
    }
    html += `<div class="week-card${isToday ? ' today-card' : ''}" onclick="calDayTapGuarded('${iso}')">
      <span class="wc-dow">${dows[d.getDay()]}</span>
      <span class="wc-date" style="color:${dateColor}">${d.getDate()}</span>
      ${badgeHtml}
      ${session && session.completed ? '<span style="font-size:11px;color:var(--easy)">✓</span>' : ''}
    </div>`;
  }

  html += '</div>';
  document.getElementById('week-view').innerHTML = html;
}

function findSessionForDate(data, iso) {
  return Object.values(data.sessions).find(s => s.date === iso) || null;
}

function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderMonthView();
}

function shiftWeekStrip(delta) {
  weekStripOffset += delta;
  renderWeekView();
}

function calDayTap(iso) {
  const data = load();
  const session = findSessionForDate(data, iso);
  if (session) {
    openWorkout(session.session_id);
  } else if ((data.fitness_test_days || {})[iso]) {
    showFitness();
  } else {
    openTypeSheet(iso);
  }
}

function openTypeSheet(iso) {
  sheetDate = iso;
  const d = new Date(iso + 'T00:00:00');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('type-sheet-title').textContent = `What type is ${dayNames[d.getDay()]}, ${mNames[d.getMonth()]} ${d.getDate()}?`;
  document.getElementById('type-sheet').classList.add('open');
  document.getElementById('sheet-backdrop').classList.add('open');
}

function closeTypeSheet() {
  document.getElementById('type-sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('open');
  sheetDate = null;
}

function pickType(type) {
  const iso = sheetDate;
  closeTypeSheet();
  if (!iso) return;
  if (type === 'fitness') {
    const data = load();
    if (!data.fitness_test_days) data.fitness_test_days = {};
    data.fitness_test_days[iso] = true;
    save(data);
    renderCalendar();
    showFitness();
    return;
  }
  const sessionId = getOrCreateSession(iso, type);
  if (type === 'rest') {
    renderCalendar();
    return;
  }
  openWorkout(sessionId);
}

// ════════════════════════════════════════════════════════════════
// WORKOUT SCREEN
// ════════════════════════════════════════════════════════════════
function openWorkout(sessionId) {
  currentSessionId = sessionId;
  showScreen('workout');
  renderWorkout(sessionId);
}

function renderWorkout(sessionId) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;

  // Header
  const badge = `<span class="day-type-badge type-${session.day_type}" style="font-weight:800">${typeName(session.day_type)}</span>`;
  let dur = '';
  if (session.started_at && session.completed_at) {
    const mins = Math.round((session.completed_at - session.started_at) / 60000);
    dur = ` · <span class="dur-edit-btn" onclick="openDurModal('${sessionId}')" title="Edit duration">${mins}m ✎</span>`;
  } else {
    dur = ` · <span class="dur-edit-btn" onclick="openDurModal('${sessionId}')" title="Set duration">+ time ✎</span>`;
  }
  document.getElementById('workout-title').innerHTML = `${badge} ${formatDateDisplay(session.date)}${dur}`;

  // Week notes
  const notesEl = document.getElementById('week-notes-input');
  notesEl.value = session.week_notes || '';
  if (notesEl.value) notesEl.classList.add('has-content');
  else notesEl.classList.remove('has-content');

  // Exercises
  renderExercises(session);

  // Apnea
  renderApneaBlock(session);

  // Complete button
  const btn = document.getElementById('complete-btn');
  if (session.completed) {
    btn.textContent = '✓ Completed';
    btn.classList.add('completed');
  } else {
    btn.textContent = 'Mark Complete';
    btn.classList.remove('completed');
  }
}

function renderExercises(session) {
  const container = document.getElementById('exercises-container');
  if (!session.exercises || session.exercises.length === 0) {
    if (session.day_type === 'cardio') {
      container.innerHTML = `<div class="ex-card" style="padding:16px;font-size:14px;color:var(--text);line-height:1.6">${esc(session.cardio_instructions || 'Cardio day')}</div>`;
    } else {
      container.innerHTML = '';
    }
    return;
  }

  let html = '';
  for (let ei = 0; ei < session.exercises.length; ei++) {
    html += renderExerciseCard(session, ei);
  }
  container.innerHTML = html;
}

function renderExerciseCard(session, exIdx) {
  const ex = session.exercises[exIdx];
  const sid = session.session_id;
  const isOpen = openCards.has(exIdx);
  const realSets = (ex.sets || []).filter(isRealSet);
  const totalSets = (ex.sets || []).length;
  const progress = `${realSets.length}/${totalSets}`;

  const suggestion = realSets.length === 0 ? computeProgression(ex.name, session.day_type) : null;

  // Target line: sets × reps · rest from plan + EXERCISE_INFO
  let targetLine = '';
  {
    // Prefer values stored on the exercise; fall back to current plan lookup
    let planSets = ex.plan_sets || '';
    let planReps = ex.plan_reps || '';
    if (!planSets || !planReps) {
      const data = load();
      const planDay = data.plan?.weeks?.flatMap(w => w.days).find(
        d => d.type === session.day_type && (d.exercises || []).some(e => e.name === ex.name)
      );
      const planEx = planDay?.exercises?.find(e => e.name === ex.name);
      if (planEx) { planSets = planEx.sets || ''; planReps = planEx.reps || ''; }
    }
    const info = getExerciseInfo(ex.name);
    const rest = info?.rest || '';
    const parts = [];
    if (planSets && planReps) parts.push(`${planSets} × ${planReps}`);
    if (rest) parts.push(`rest ${rest}`);
    if (parts.length) targetLine = parts.join(' · ');
  }

  // Last session summary
  const lastSession = getLastSession(session.day_type);
  let lastSummary = '';
  if (lastSession) {
    const prevEx = lastSession.exercises.find(e => e.name === ex.name);
    if (prevEx) {
      const prevReal = prevEx.sets.filter(isRealSet);
      if (prevReal.length > 0) {
        const w = prevReal[0].weight;
        const repsArr = prevReal.map(s => s.reps).join('/');
        lastSummary = `Last: ${w > 0 ? w + ' lbs' : 'BW'} · ${repsArr} reps`;
      }
    }
  }

  // Collect previous session's notes per set index for tooltip placeholders
  let prevNotes = [];
  if (lastSession) {
    const prevEx = lastSession.exercises.find(e => e.name === ex.name);
    if (prevEx) {
      prevNotes = (prevEx.sets || []).map(s => s.note || '');
    }
  }

  let setsHtml = '';
  for (let si = 0; si < (ex.sets || []).length; si++) {
    setsHtml += renderSetRow(sid, exIdx, si, ex.sets[si], ex.bw_mode, prevNotes[si] || '');
  }

  const exDone = totalSets > 0 && realSets.length >= totalSets;
  const hasInfo = !!getExerciseInfo(ex.name);
  return `<div class="ex-card${isOpen ? ' open' : ''}${exDone ? ' ex-done' : ''}" id="exc-${esc(sid)}-${exIdx}">
    <div class="ex-header" onclick="toggleExCard(${exIdx})">
      <span class="ex-name">${esc(ex.name)}</span>
      ${hasInfo ? `<button class="ex-info-btn" onclick="event.stopPropagation();showExerciseInfo('${esc(ex.name)}')" title="Cues &amp; hold protocol">ⓘ</button>` : ''}
      <span class="ex-progress">${progress}</span>
      <span class="ex-chevron">⌄</span>
    </div>
    ${suggestion ? `<div class="ex-suggestion">${esc(suggestion)}</div>` : ''}
    <div class="ex-body">
      ${targetLine ? `<div class="ex-target-line">${esc(targetLine)}</div>` : ''}
      ${lastSummary ? `<div class="ex-last-session">${esc(lastSummary)}</div>` : ''}
      <div class="set-list" id="sl-${esc(sid)}-${exIdx}">${setsHtml}</div>
      <button class="add-set-btn" onclick="addSet('${esc(sid)}', ${exIdx})">+ Add Set</button>
    </div>
  </div>`;
}

function renderSetRow(sid, exIdx, setIdx, s, bwMode, prevNote) {
  const wVal = s.prefilled ? '' : (s.weight !== '' && s.weight !== null ? s.weight : '');
  const wPlaceholder = s.prefilled && s.weight !== '' ? s.weight : '';

  const effortPills = ['easy','moderate','hard'].map(e => {
    const active = s.effort === e;
    const cls = active ? ` active-${e === 'moderate' ? 'mod' : e}` : '';
    const label = e === 'moderate' ? 'Mod' : e.charAt(0).toUpperCase() + e.slice(1);
    return `<button class="pill${cls}" onclick="handleEffortInput('${esc(sid)}',${exIdx},${setIdx},'${e}')">${label}</button>`;
  }).join('');

  const adjPills = ['increase','same','decrease'].map(a => {
    const active = s.adjustment === a;
    const cls = active ? ' active-adj' : '';
    const label = a === 'increase' ? '↑' : a === 'same' ? '=' : '↓';
    return `<button class="pill${cls}" onclick="handleAdjustmentInput('${esc(sid)}',${exIdx},${setIdx},'${a}')">${label}</button>`;
  }).join('');

  const hasNote = s.note && s.note.trim();
  const noteOpen = hasNote ? 'open' : '';
  // Previous session note shown as placeholder (tooltip equivalent on mobile)
  const notePlaceholder = hasNote ? '' : (prevNote ? `Prev: ${prevNote}` : 'Note…');

  let weightHtml;
  if (bwMode) {
    const data = load();
    const bwVal = s.bw !== undefined ? s.bw : (data.bodyweight || 185);
    const bwaVal = s.bw_added !== undefined ? s.bw_added : '';
    weightHtml = `<div class="bw-wrap">
      <input type="number" class="bw-input" value="${bwVal}" placeholder="BW" oninput="handleBWInput('${esc(sid)}',${exIdx},${setIdx},'bw',this.value)">
      <span class="bw-plus">+</span>
      <input type="number" class="bwa-input" value="${bwaVal !== '' ? bwaVal : ''}" placeholder="0" oninput="handleBWInput('${esc(sid)}',${exIdx},${setIdx},'bw_added',this.value)">
    </div>`;
  } else {
    weightHtml = `<input type="number" class="weight-input" value="${wVal}" placeholder="${wPlaceholder}" oninput="handleWeightInput('${esc(sid)}',${exIdx},${setIdx},this.value)">`;
  }

  return `<div class="set-row-wrap" id="srw-${esc(sid)}-${exIdx}-${setIdx}">
    <div class="set-row">
      <div class="set-row-line1">
        ${weightHtml}
        <span class="set-sep">×</span>
        <input type="number" class="reps-input" value="${s.prefilled ? '' : (s.reps !== '' && s.reps !== null && s.reps !== undefined ? s.reps : '')}" placeholder="reps" oninput="handleRepInput('${esc(sid)}',${exIdx},${setIdx},this.value)">
        <button class="set-delete-btn" onclick="deleteSet('${esc(sid)}',${exIdx},${setIdx})">✕</button>
      </div>
      <div class="set-row-line2">
        <div class="pill-group">${effortPills}</div>
        <div class="pill-group">${adjPills}</div>
        <button class="note-toggle${hasNote ? ' has-note' : ''}" onclick="toggleNote(this)">ⓘ</button>
      </div>
      <div class="note-input-wrap${noteOpen ? ' open' : ''}">
        <input type="text" class="note-input" value="${esc(s.note || '')}" placeholder="${esc(notePlaceholder)}" oninput="handleNoteInput('${esc(sid)}',${exIdx},${setIdx},this.value)">
      </div>
    </div>
  </div>`;
}

function toggleExCard(exIdx) {
  if (openCards.has(exIdx)) openCards.delete(exIdx);
  else openCards.add(exIdx);
  const data = load();
  const session = data.sessions[currentSessionId];
  if (!session) return;
  renderExercises(session);
}

// ════════════════════════════════════════════════════════════════
// SET INPUT HANDLERS
// ════════════════════════════════════════════════════════════════
function handleRepInput(sessionId, exIdx, setIdx, val) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;
  const set = session.exercises[exIdx].sets[setIdx];
  const numVal = parseFloat(val);

  set.reps = isFinite(numVal) && numVal > 0 ? numVal : (val === '' ? '' : val);

  if (isRealSet(set)) {
    if (set.prefilled) set.prefilled = false;
    if (!set.ts) set.ts = Date.now();
    if (!session.date) {
      session.date = todayISO();
    }

    if (!session.started_at && !startModalPending) {
      startModalPending = sessionId;
      showStartModal();
    }
  }

  session.updated_at = Date.now();
  save(data);
  refreshExProgress(sessionId, exIdx);
}

function handleWeightInput(sessionId, exIdx, setIdx, val) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;
  const set = session.exercises[exIdx].sets[setIdx];
  const numVal = parseFloat(val);
  set.weight = isFinite(numVal) ? numVal : (val === '' ? '' : val);
  if (set.prefilled && val !== '') set.prefilled = false;
  session.updated_at = Date.now();
  save(data);
}

function handleBWInput(sessionId, exIdx, setIdx, field, val) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;
  const set = session.exercises[exIdx].sets[setIdx];
  const numVal = parseFloat(val);
  const n = isFinite(numVal) ? numVal : 0;
  if (field === 'bw') {
    set.bw = n;
    if (data.bodyweight === undefined) data.bodyweight = n;
  } else {
    set.bw_added = n;
  }
  set.weight = (set.bw || 0) + (set.bw_added || 0);
  session.updated_at = Date.now();
  save(data);
}

function refreshExProgress(sessionId, exIdx) {

function refreshSetRow(sessionId, exIdx, setIdx) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;
  const ex = session.exercises[exIdx];
  const set = ex.sets[setIdx];
  const wrap = document.getElementById(`srw-${sessionId}-${exIdx}-${setIdx}`);

  tmp.innerHTML = renderSetRow(sessionId, exIdx, setIdx, set, ex.bw_mode);

function addSet(sessionId, exIdx) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;
  const ex = session.exercises[exIdx];
  const prevSets = ex.sets.filter(isRealSet);
  const prevWeight = prevSets.length > 0 ? prevSets[prevSets.length-1].weight : '';
  ex.sets.push({
    weight: prevWeight,
    reps: '',
    effort: '',
    adjustment: '',
    note: '',
    ts: null,
    prefilled: prevWeight !== '' ? true : false,
  });
  session.updated_at = Date.now();
  save(data);

  const listEl = document.getElementById(`sl-${sessionId}-${exIdx}`);
  if (listEl) {
    const si = ex.sets.length - 1;
    const tmp = document.createElement('div');
    tmp.innerHTML = renderSetRow(sessionId, exIdx, si, ex.sets[si], ex.bw_mode);
    listEl.appendChild(tmp.firstElementChild);
  }
  refreshExProgress(sessionId, exIdx);
}

function deleteSet(sessionId, exIdx, setIdx) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;
  session.exercises[exIdx].sets.splice(setIdx, 1);
  session.updated_at = Date.now();
  save(data);

  const listEl = document.getElementById(`sl-${sessionId}-${exIdx}`);
  if (listEl) {
    const tmp = document.createElement('div');
    const ex = session.exercises[exIdx];
    let html = '';
    for (let si = 0; si < ex.sets.length; si++) {
      html += renderSetRow(sessionId, exIdx, si, ex.sets[si], ex.bw_mode);
    }
    listEl.innerHTML = html;
  }
  refreshExProgress(sessionId, exIdx);
  toast('Set deleted');
}

// APNEA BLOCK
// ════════════════════════════════════════════════════════════════
function renderApneaBlock(session) {
  const container = document.getElementById('apnea-container');
  const type = session.day_type;
  if (type === 'rest') { container.innerHTML = ''; return; }

  const rounds = 6;
  const apnea = session.apnea || {};

  let fieldsForType;
  if (type === 'push') {
    fieldsForType = [
      { key: 'actual_hold', label: 'Hold (M:SS)', format: 'mss' },
      { key: 'contraction', label: 'Contraction', format: 'mss' },
      { key: 'note', label: 'Note', format: 'text' },
    ];
  } else if (type === 'pull' || type === 'cardio') {
    fieldsForType = [
      { key: 'actual_dur', label: 'Duration (M:SS)', format: 'mss' },
      { key: 'steps', label: 'Steps', format: 'num' },
      { key: 'note', label: 'Note', format: 'text' },
    ];
  } else if (type === 'legs') {
    fieldsForType = [
      { key: 'actual_hold', label: 'Hold (M:SS)', format: 'mss' },
      { key: 'note', label: 'Note', format: 'text' },
    ];
  } else {
    container.innerHTML = '';
    return;
  }

  let roundsHtml = '';
  for (let r = 0; r < rounds; r++) {
    const rKey = `r${r}`;
    const rData = apnea[rKey] || {};
    let fieldsHtml = '<div class="apnea-fields">';
    for (const f of fieldsForType) {
      const saved = rData[f.key] !== undefined ? rData[f.key] : '';
      let inputHtml;
      if (f.format === 'mss') {
        const displayVal = saved !== '' && saved !== null ? fmtMSS(saved) : '';
        inputHtml = `<input type="text" class="apnea-input" value="${esc(displayVal)}" placeholder="0:00"
          oninput="handleApneaInput('${esc(session.session_id)}','${rKey}','${f.key}','mss',this)"
          onblur="handleApneaBlur(this)">`;
      } else if (f.format === 'num') {
        inputHtml = `<input type="number" class="apnea-input" value="${saved !== '' ? saved : ''}" placeholder="0"
          oninput="handleApneaInput('${esc(session.session_id)}','${rKey}','${f.key}','num',this)">`;
      } else {
        inputHtml = `<input type="text" class="apnea-note-input" value="${esc(saved)}" placeholder="note…"
          oninput="handleApneaInput('${esc(session.session_id)}','${rKey}','${f.key}','text',this)">`;
      }
      fieldsHtml += `<div class="apnea-field-wrap">
        <span class="apnea-field-label">${esc(f.label)}</span>
        ${inputHtml}
      </div>`;
    }
    fieldsHtml += '</div>';
    const tgt = (APNEA_TARGETS[type] || [])[r];
    let tgtHtml = '';
    if (tgt) {
      const parts = [];
      if (tgt.breatheUp) parts.push(`Breathe-up: ${tgt.breatheUp}`);
      parts.push(tgt.mode);
      parts.push(`Target: ${tgt.target}`);
      parts.push(`Recovery: ${tgt.recovery}`);
      tgtHtml = `<div class="apnea-target-line">${esc(parts.join(' · '))}</div>`;
    }
    roundsHtml += `<div class="apnea-round">
      <div class="apnea-round-label">Round ${r+1}</div>
      ${tgtHtml}
      ${fieldsHtml}
    </div>`;
  }

  // Apnea done = any round has at least one non-empty field logged
  const apneaDone = Object.values(apnea).some(round =>
    Object.values(round).some(v => v !== '' && v !== null && v !== undefined)
  );
  const html = `<div class="apnea-block${openApnea ? ' open' : ''}${apneaDone ? ' apnea-done' : ''}">
    <div class="apnea-header" onclick="toggleApneaBlock()">
      <span class="apnea-title">⬦ Apnea</span>
      <span class="apnea-chevron">⌄</span>
    </div>
    <div class="apnea-body">${roundsHtml}</div>
  </div>`;

  container.innerHTML = html;
}

function toggleApneaBlock() {
  openApnea = !openApnea;
  document.querySelector('.apnea-block')?.classList.toggle('open', openApnea);
}

function handleApneaInput(sessionId, roundKey, field, format, inputEl) {
  const data = load();
  const session = data.sessions[sessionId];
  if (!session) return;
  if (!session.apnea) session.apnea = {};
  if (!session.apnea[roundKey]) session.apnea[roundKey] = {};

  const val = inputEl.value;
  if (format === 'mss') {
    // Store on blur, not on input — just validate visually
    inputEl.classList.remove('invalid');
  } else if (format === 'num') {
    const n = parseFloat(val);
    session.apnea[roundKey][field] = isFinite(n) ? n : '';
    session.updated_at = Date.now();
    save(data);
  } else {
    session.apnea[roundKey][field] = val;
    session.updated_at = Date.now();
    save(data);
  }
}

function handleApneaBlur(inputEl) {
  const val = inputEl.value.trim();
  if (!val) { inputEl.classList.remove('invalid'); return; }
  const parsed = parseMSS(val);
  if (parsed === null) {
    inputEl.classList.add('invalid');
    inputEl.value = '';
    return;
  }
  inputEl.classList.remove('invalid');

  // Find the session and field from the input's context
  const roundDiv = inputEl.closest('.apnea-round');
  if (!roundDiv) return;
  const rounds = Array.from(document.querySelectorAll('.apnea-round'));
  const roundIdx = rounds.indexOf(roundDiv);
  if (roundIdx < 0 || !currentSessionId) return;

  const data = load();
  const session = data.sessions[currentSessionId];
  if (!session) return;
  if (!session.apnea) session.apnea = {};
  const rKey = `r${roundIdx}`;
  if (!session.apnea[rKey]) session.apnea[rKey] = {};

  // Determine which field based on placeholder
  const ph = inputEl.placeholder;
  const field = ph === '0:00' ? (session.day_type === 'push' || session.day_type === 'legs' ? 'actual_hold' : 'actual_dur') : 'contraction';
  const allInputs = roundDiv.querySelectorAll('.apnea-input');
  const fieldIdx = Array.from(allInputs).indexOf(inputEl);
  const type = session.day_type;
  const fieldKeys = type === 'push'
    ? ['actual_hold', 'contraction']
    : type === 'pull' || type === 'cardio'
    ? ['actual_dur']
    : ['actual_hold'];

  if (fieldIdx < fieldKeys.length) {
    session.apnea[rKey][fieldKeys[fieldIdx]] = parsed;
  }
  session.updated_at = Date.now();
  save(data);
}

// ════════════════════════════════════════════════════════════════
// MARK COMPLETE
// ════════════════════════════════════════════════════════════════
function validateDayForComplete(session) {
  const errors = [];
  for (let ei = 0; ei < session.exercises.length; ei++) {
    const ex = session.exercises[ei];
    for (let si = 0; si < ex.sets.length; si++) {
      const s = ex.sets[si];
      const hasWeight = s.weight !== '' && s.weight !== null && isFinite(Number(s.weight));
      const hasReps = s.reps > 0;
      const touched = hasWeight || hasReps;
      if (!touched) continue;
      if (!hasWeight) errors.push(`${ex.name} set ${si+1}: missing weight`);
      if (!hasReps) errors.push(`${ex.name} set ${si+1}: missing reps`);
      if (!s.effort) errors.push(`${ex.name} set ${si+1}: missing effort`);
      if (!s.adjustment) errors.push(`${ex.name} set ${si+1}: missing adjustment`);
    }
  }
  return errors;
}

function markComplete() {
  const data = load();
  const session = data.sessions[currentSessionId];
  if (!session) return;

  if (session.completed) return;

  const errors = validateDayForComplete(session);
  if (errors.length > 0) {
    const list = document.getElementById('val-error-list');
    list.innerHTML = errors.map(e => `<li>${esc(e)}</li>`).join('');
    document.getElementById('val-modal').classList.add('open');
    return;
  }

  session.completed = true;
  session.completed_at = Date.now();
  if (!session.date) session.date = todayISO();
  session.updated_at = Date.now();
  save(data);

  const btn = document.getElementById('complete-btn');
  btn.textContent = '✓ Completed';
  btn.classList.add('completed');

  const d = data.sessions[currentSessionId];
  let dur = '';
  if (d.started_at && d.completed_at) {
    const mins = Math.round((d.completed_at - d.started_at) / 60000);
    dur = ` · ${mins}m`;
  }
  toast('Day complete!' + dur);
  syncNow(true);
}

function tsToDatetimeLocal(ts) {
  if (!ts) return '';
  const d = new Date(ts);

  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Stopwatch
function swToggle() {
  if (swRunning) {
    clearInterval(swInterval);
    swRunning = false;
    document.getElementById('sw-start-btn').textContent = 'Resume';
  } else {
    const start = Date.now() - swElapsed;
    swRunning = true;
    swInterval = setInterval(() => {
      swElapsed = Date.now() - start;
      renderSW();
    }, 100);
    document.getElementById('sw-start-btn').textContent = 'Stop';
  }
}

function swReset() {
  clearInterval(swInterval);
  swRunning = false;
  swElapsed = 0;
  document.getElementById('sw-start-btn').textContent = 'Start';
  renderSW();
}

function renderSW() {
  const total = swElapsed;
  const m = Math.floor(total / 60000);
  const s = Math.floor((total % 60000) / 1000);
  const t = Math.floor((total % 1000) / 100);
  const txt = `${m}:${String(s).padStart(2,'0')}.${t}`;
  document.getElementById('sw-display').textContent = txt;
  const pip = document.getElementById('sw-pip-display');
  if (pip) pip.textContent = txt;
}

// Countdown
function cdScheduleTones(endTime) {
  cdAlarmTimeouts.forEach(clearTimeout);
  cdAlarmTimeouts = [];
  const now = Date.now();
  // 3-2-1 bells scheduled from shared endTime — no snapshot drift
  [3, 2, 1].forEach(sec => {
    const delay = endTime - now - sec * 1000;
    if (delay >= 0) {
      cdAlarmTimeouts.push(setTimeout(() => playBell(), delay));
    }
  });
  // Alarm + auto-reset at end
  cdAlarmTimeouts.push(setTimeout(() => {
    playAlarm();
    cdAlarmTimeouts.push(setTimeout(() => {
      cdRemaining = cdTotal;
      cdRunning = false;
      document.getElementById('cd-start-btn').textContent = 'Start';
      renderCD();
      renderCDPresets();
      document.getElementById('cd-pip').classList.remove('visible');
    }, 3000));
  }, Math.max(0, endTime - now)));
}

function cdToggle() {
  if (cdRunning) {
    clearInterval(cdInterval);
    cdAlarmTimeouts.forEach(clearTimeout);
    cdAlarmTimeouts = [];
    cdRunning = false;
    document.getElementById('cd-start-btn').textContent = 'Start';
  } else {
    if (cdRemaining <= 0) cdRemaining = cdTotal;
    cdRunning = true;
    document.getElementById('cd-start-btn').textContent = 'Stop';
    const endTime = Date.now() + cdRemaining * 1000;
    cdScheduleTones(endTime);
    cdInterval = setInterval(() => {
      cdRemaining = Math.max(0, (endTime - Date.now()) / 1000);
      renderCD();
      if (cdRemaining <= 0) {
        clearInterval(cdInterval);
        cdRunning = false;
        document.getElementById('cd-start-btn').textContent = 'Start';
      }
    }, 100);
  }
}

function cdReset() {
  clearInterval(cdInterval);
  cdAlarmTimeouts.forEach(clearTimeout);
  cdAlarmTimeouts = [];
  cdRunning = false;
  cdRemaining = cdTotal;
  document.getElementById('cd-start-btn').textContent = 'Start';
  renderCD();
}

const CD_DEFAULT_PRESETS = [20, 30, 60, 90, 120];
const CD_PRESET_KEY = 'wt_cd_presets';

function loadCDPresets() {
  try {
    const saved = JSON.parse(localStorage.getItem(CD_PRESET_KEY));
    return Array.isArray(saved) ? saved : [...CD_DEFAULT_PRESETS];
  } catch { return [...CD_DEFAULT_PRESETS]; }
}

function saveCDPresets(presets) {
  localStorage.setItem(CD_PRESET_KEY, JSON.stringify(presets));
}

let cdHoldTimer = null;

function renderCDPresets() {
  const presets = loadCDPresets();
  const container = document.getElementById('cd-presets-list');
  if (!container) return;
  container.innerHTML = presets.map(secs => {
    const label = secs < 60 ? secs + 's' : fmtMSS(secs);
    const isActive = secs === cdTotal;
    return `<div class="cd-preset-wrap">
      <button class="cd-preset-btn${isActive ? ' active' : ''}"
        onclick="cdSetPreset(${secs})"
        oncontextmenu="event.preventDefault();cdConfirmDelete(${secs})"
        ontouchstart="cdHoldStart(event,${secs})"
        ontouchend="cdHoldEnd()"
        ontouchmove="cdHoldEnd()">${label}</button>
    </div>`;
  }).join('');
}

function cdHoldStart(e, secs) {
  const btn = e.currentTarget;
  btn.classList.add('hold-active');
  cdHoldTimer = setTimeout(() => {
    btn.classList.remove('hold-active');
    cdConfirmDelete(secs);
  }, 600);
}

function cdHoldEnd() {
  if (cdHoldTimer) { clearTimeout(cdHoldTimer); cdHoldTimer = null; }
  document.querySelectorAll('.cd-preset-btn.hold-active').forEach(b => b.classList.remove('hold-active'));
}

function cdConfirmDelete(secs) {
  const label = secs < 60 ? secs + 's' : fmtMSS(secs);
  showConfirmModal(`Delete preset ${label}?`, 'This cannot be undone.', () => {
    cdDeletePreset(secs);
  });
}

function cdSavePreset() {
  const val = document.getElementById('cd-custom-input').value.trim();
  // Also accept currently-set time if input is empty
  const parsed = val ? parseMSS(val) : null;
  const secs = parsed !== null ? parsed : cdTotal;
  if (!secs || secs <= 0) { toast('Set a time first'); return; }
  const presets = loadCDPresets();
  if (presets.includes(secs)) { toast('Preset already exists'); return; }
  presets.push(secs);
  presets.sort((a, b) => a - b);
  saveCDPresets(presets);
  renderCDPresets();
  toast('Preset saved');
}

function cdDeletePreset(secs) {
  const presets = loadCDPresets().filter(p => p !== secs);
  saveCDPresets(presets);
  renderCDPresets();
}

function cdSetPreset(secs) {
  // Stop any running countdown first
  clearInterval(cdInterval);
  cdAlarmTimeouts.forEach(clearTimeout);
  cdAlarmTimeouts = [];
  cdRunning = false;
  cdTotal = secs;
  cdRemaining = secs;
  renderCDPresets();
  renderCD();
  // Auto-start immediately
  cdToggle();
}

function cdSetCustom() {
  const val = document.getElementById('cd-custom-input').value;
  const parsed = parseMSS(val);
  if (parsed === null || parsed <= 0) { toast('Invalid time format (M:SS)'); return; }
  cdTotal = parsed;
  cdRemaining = parsed;
  clearInterval(cdInterval);
  cdRunning = false;
  document.getElementById('cd-start-btn').textContent = 'Start';
  renderCDPresets();
  renderCD();
}

function renderCD() {
  const m = Math.floor(cdRemaining / 60);
  const s = Math.floor(cdRemaining % 60);
  const txt = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('cd-display').textContent = txt;
  const pip = document.getElementById('cd-pip-display');
  if (pip) pip.textContent = txt;
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBell() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 880;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 1.0);
}

function playBuzz() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 200;
  osc.type = 'square';
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.setValueAtTime(0, ctx.currentTime + 0.8);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.8);
}

function playAlarm() {
  playBell();
  cdAlarmTimeouts.push(setTimeout(playBell, 400));
  cdAlarmTimeouts.push(setTimeout(playBell, 800));
  cdAlarmTimeouts.push(setTimeout(playBuzz, 1200));
}

// Unlock audio on first user interaction
document.addEventListener('touchstart', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });
