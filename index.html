<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Workout Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workouts">
<meta name="theme-color" content="#06090f">
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;: &quot;Workout Tracker&quot;,
  &quot;short_name&quot;: &quot;Workouts&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;background_color&quot;: &quot;#06090f&quot;,
  &quot;theme_color&quot;: &quot;#00A1E0&quot;,
  &quot;start_url&quot;: &quot;.&quot;,
  &quot;icons&quot;: []
}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap');
:root {
  --bg:#06090f; --s1:#0d1522; --s2:#12202f; --border:#1c3048;
  --text:#edf2f7; --muted:#8ea8c3; --dim:#4d6b85;
  --accent:#00A1E0; --accent-bg:rgba(0,161,224,.1); --accent-mid:rgba(0,161,224,.35);
  --easy:#22c55e; --moderate:#f59e0b; --hard:#ef4444;
  --increase:#3b82f6; --same:#536778; --decrease:#f97316;
  --gold:rgba(250,204,21,1); --gold-hi:rgba(250,204,21,.85);
  --gold-mid:rgba(250,204,21,.45); --gold-lo:rgba(250,204,21,.12);
  --r:10px; --rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px}

/* Header */
header{position:sticky;top:0;z-index:100;background:var(--s1);border-bottom:2px solid var(--accent);padding:0 20px;height:auto;min-height:62px;display:flex;align-items:center;gap:12px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));padding-top:max(12px,env(safe-area-inset-top));}
header::after{content:'';position:absolute;bottom:-1px;left:0;width:3px;top:0;background:var(--accent)}
header h1{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:.8px;white-space:nowrap;color:var(--accent);text-transform:uppercase}
.week-nav{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.week-nav button{background:var(--s2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:var(--rs);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.week-nav button:hover{background:var(--accent-bg);border-color:var(--accent-mid);color:var(--accent)}
#week-label{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;min-width:130px;text-align:center;letter-spacing:.2px}
.upload-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:8px 14px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;letter-spacing:.3px}
.upload-btn:hover{background:#0090cc;box-shadow:0 0 16px rgba(0,161,224,.3)}
.export-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:var(--rs);padding:5px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;flex-shrink:0}
.export-btn:hover{border-color:var(--accent-mid);color:var(--accent)}
.export-btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* Layout */
.app-layout{display:flex;align-items:flex-start;width:100%;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.cal-sidebar{width:38%;flex-shrink:0;position:sticky;top:62px;height:calc(100vh - 62px);padding:18px 16px;padding-bottom:max(18px,env(safe-area-inset-bottom));border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px;overscroll-behavior:contain}
main{flex:1;min-width:0;padding:22px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Calendar */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cal-month-label{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--text);letter-spacing:.5px;text-transform:uppercase;position:relative;cursor:pointer}
.cal-month-label::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--accent-mid);color:var(--accent);font-size:11px;font-weight:700;font-family:'Barlow',sans-serif;letter-spacing:.3px;text-transform:none;white-space:nowrap;padding:4px 10px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .15s}
.cal-month-label:hover::after,.cal-month-label.tooltip-visible::after{opacity:1}
.cal-nav-btn{background:none;border:1px solid var(--border);color:var(--muted);width:44px;height:44px;min-width:44px;min-height:44px;border-radius:var(--rs);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{background:var(--accent-bg);border-color:var(--accent-mid);color:var(--accent)}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);flex-shrink:0}
.cal-dow-cell{font-size:11px;font-weight:700;color:var(--dim);text-align:center;padding:6px 0;letter-spacing:.5px;text-transform:uppercase}
.cal-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:3px}
.cal-cell{background:var(--s2);border-radius:6px;padding:5px 4px;border:1px solid transparent;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative}
.cal-status{position:absolute;top:3px;left:3px;line-height:1;font-size:9px}
.cal-empty{background:transparent;border-color:transparent}
.cal-has-data{background:var(--gold-lo);border-color:var(--gold-mid);cursor:pointer}
.cal-has-data:hover{background:rgba(250,204,21,.2);border-color:var(--gold-hi)}
.cal-today{border-color:var(--accent)!important;box-shadow:inset 0 0 0 1px var(--accent-mid)}
.cal-today .cal-day-num{color:var(--accent)}
.cal-rest{background:rgba(100,116,139,.13)!important;border-color:rgba(100,116,139,.35)!important}
.cal-rest .cal-day-num{color:#94a3b8}
.cal-injury{background:rgba(239,68,68,.1)!important;border-color:rgba(239,68,68,.45)!important}
.cal-injury .cal-day-num{color:#f87171}
.cal-day-status-btn{position:absolute;bottom:3px;right:3px;background:none;border:none;cursor:pointer;padding:1px;line-height:1;opacity:.4;transition:opacity .15s;border-radius:3px;font-size:11px}
.cal-cell:hover .cal-day-status-btn{opacity:1}
.cal-day-status-btn.active{opacity:1}
.cal-day-status-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;align-items:center;justify-content:center}
.cal-day-num{font-size:13px;font-weight:700;color:var(--dim);text-align:right;line-height:1;margin-bottom:3px;flex-shrink:0}
.cal-has-data .cal-day-num{color:var(--gold-hi)}
.cal-entry{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--gold-hi);min-height:0}
.cal-entry svg{width:22px;height:22px;flex-shrink:0}
.cal-entry-type{font-size:10px;font-weight:800;line-height:1;text-align:center;letter-spacing:.5px;text-transform:uppercase}
.cal-entry-sets{font-size:9px;color:var(--text);line-height:1;text-align:center}

@media(max-width:768px){
  .app-layout{flex-direction:column}
  .cal-sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);padding:14px}
  .cal-grid{grid-auto-rows:80px}
}
.sidebar-toggle{display:flex;background:var(--s2);border-radius:var(--rs);padding:3px;gap:3px;margin-bottom:12px;flex-shrink:0}
.sidebar-tab{flex:1;border-radius:5px;padding:9px 0;min-height:44px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:none;color:var(--text);border:1px solid transparent;letter-spacing:.3px;-webkit-user-select:none;user-select:none}
.sidebar-tab.active{background:var(--s1);color:var(--accent);border-color:var(--accent-mid)}
#cal-view{display:flex;flex-direction:column;flex:1;min-height:0;gap:10px}
#timer-view{display:flex;flex-direction:column;flex:1;min-height:0}
.timer-display{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;text-align:center;letter-spacing:-1px;margin:20px 0;line-height:1}
.timer-display.expired{color:var(--hard)}
.timer-mode-toggle{display:flex;background:var(--s2);border-radius:var(--rs);padding:3px;gap:3px;margin-bottom:14px;flex-shrink:0}
.timer-tab{flex:1;border:none;border-radius:5px;padding:7px 0;min-height:44px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:none;color:var(--text);-webkit-user-select:none;user-select:none}
.timer-tab.active{background:var(--s1);color:var(--accent)}
.timer-btns{display:flex;gap:10px}
.timer-btn-primary{flex:1;background:var(--accent-bg);border:1px solid var(--accent-mid);color:var(--accent);border-radius:var(--rs);padding:13px 0;font-family:'Barlow',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s}
.timer-btn-primary:hover{background:rgba(0,161,224,.2);border-color:var(--accent)}
.timer-btn-secondary{background:none;border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:13px 18px;font-family:'Barlow',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s}
.timer-btn-secondary:hover{border-color:var(--muted);color:var(--text)}
.cd-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:14px}
.cd-preset{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:10px 4px;min-height:44px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;position:relative;overflow:visible}
.cd-preset:hover{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-bg)}
.cd-preset.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.preset-del{position:absolute;top:-4px;right:-4px;font-size:10px;background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:50%;width:14px;height:14px;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.cd-preset:hover .preset-del{display:flex}
.cd-custom{display:flex;align-items:center;gap:8px;margin:10px 0}
.cd-custom-input{width:54px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;font-weight:700;padding:8px;text-align:center;outline:none;-moz-appearance:textfield}
.cd-custom-input::-webkit-outer-spin-button,.cd-custom-input::-webkit-inner-spin-button{-webkit-appearance:none}
.cd-custom-input:focus{border-color:var(--accent);background:var(--s1)}
.cd-custom-sep{font-size:18px;font-weight:800;color:var(--muted)}
.cd-add-input{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;padding:8px 10px;outline:none}
.cd-add-input:focus{border-color:var(--accent)}

/* Upload */
.upload-section{text-align:center;padding:60px 20px}
.upload-section h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;letter-spacing:.5px;margin-bottom:8px;color:var(--text);text-transform:uppercase}
.upload-section>p{color:var(--muted);margin-bottom:28px;font-size:15px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r);padding:40px 20px;cursor:pointer;transition:border-color .2s,background .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-bg)}
.drop-zone svg{margin-bottom:12px;color:var(--dim)}
.drop-zone p{color:var(--muted);font-size:15px}

/* Processing */
.processing{text-align:center;padding:60px 20px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.processing p{color:var(--muted);font-size:15px}

/* Day cards */
.day-card{background:var(--s1);border:2px solid var(--gold-mid);border-radius:var(--r);margin-bottom:14px;overflow:hidden;transition:border-color .2s}
.day-card.open{border-color:var(--gold)}
.day-header{display:flex;align-items:center;padding:14px 18px;cursor:pointer;user-select:none;-webkit-user-select:none;gap:10px;border-bottom:2px solid transparent;transition:border-color .2s,background .15s}
.day-card.open .day-header{border-bottom-color:var(--gold-mid)}
.day-header:hover{background:var(--gold-lo)}
.day-header h2{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;flex:1;letter-spacing:.5px;text-transform:uppercase}
.day-type-badge{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid currentColor}
.day-type-badge.push-badge{background:var(--gold-lo);color:var(--gold)}
.day-type-badge.pull-badge{background:var(--gold-lo);color:var(--gold)}
.day-type-badge.legs-badge{background:var(--gold-lo);color:var(--gold)}
.day-type-badge.pool-badge{background:var(--accent-bg);color:var(--accent)}
.day-type-badge.cardio-badge{background:rgba(34,197,94,.1);color:var(--easy)}
.cal-type-badge{width:28px;height:28px;border-radius:6px}
.cal-type-badge svg{width:16px;height:16px}
.day-complete-check{display:flex;align-items:center;flex-shrink:0;color:var(--easy)}
.complete-wrap{padding:6px 18px 14px}
.mark-complete-btn{width:100%;background:none;border:1px solid rgba(34,197,94,.4);color:rgba(34,197,94,.7);border-radius:var(--rs);padding:10px 16px;min-height:44px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.mark-complete-btn:hover{border-color:var(--easy);color:var(--easy);background:rgba(34,197,94,.08)}
.mark-complete-btn.completed{background:rgba(34,197,94,.12);border-color:var(--easy);color:var(--easy)}
.day-date-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.day-date-display{font-size:12px;color:var(--gold-hi);font-weight:700}
.day-date-btn{background:none;border:none;color:var(--gold-mid);cursor:pointer;padding:10px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:color .15s;flex-shrink:0;position:relative}
.day-date-btn:hover{color:var(--gold)}
.day-date-input{position:absolute;opacity:0;top:0;left:0;width:100%;height:100%;pointer-events:auto;cursor:pointer;font-size:16px}
.day-progress{font-size:12px;color:var(--text);font-weight:700;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
.day-progress-track{height:3px;background:var(--border);position:relative;flex-shrink:0}
.day-progress-fill{height:100%;background:var(--gold);position:absolute;top:0;left:0;transition:width .4s ease}
.day-chevron{color:var(--gold-mid);font-size:20px;transition:transform .2s;line-height:1;flex-shrink:0}
.day-card.open .day-chevron{transform:rotate(90deg);color:var(--gold)}
.day-body{display:none}
.day-card.open .day-body{display:block}

/* Exercises */
.exercise-card{border-bottom:1px solid rgba(250,204,21,.18);padding:16px 18px}
.exercise-card:last-child{border-bottom:none}
.ex-collapse-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 4px;border-radius:4px;display:flex;align-items:center;flex-shrink:0;transition:color .15s}
.ex-collapse-btn:hover{color:var(--text)}
.ex-collapse-btn svg{transition:transform .2s;transform:rotate(90deg)}
.exercise-card.collapsed .ex-collapse-btn svg{transform:rotate(0deg)}
.ex-body{display:block}
.exercise-card.collapsed .ex-body{display:none}
.ex-del-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 6px;min-height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;flex-shrink:0}
.exercise-card:hover .ex-del-btn{opacity:1}
.ex-del-btn:hover{color:var(--hard);opacity:1}
.ex-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:nowrap}
.ex-name-col{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
.ex-name-wrap{display:flex;align-items:center;gap:6px;min-width:0;flex-wrap:nowrap}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:.3px;color:var(--gold-hi);cursor:text;border-bottom:1px dashed transparent;transition:border-color .15s;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ex-name:hover{border-bottom-color:var(--gold-mid)}
.ex-trend{overflow:hidden}
.ex-trend-empty{font-size:11px;color:var(--muted);text-align:center;padding:12px 0;font-style:italic}
.ex-name.trend-open{border-bottom:1px solid rgba(250,204,21,.4)!important}
.ex-name-input{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;background:var(--s2);border:1px solid var(--accent);border-radius:6px;color:var(--text);padding:3px 8px;outline:none;min-width:0;width:100%}
.edit-icon{color:var(--gold-mid);font-size:12px;cursor:pointer;opacity:0;transition:opacity .15s;flex-shrink:0;padding:10px;min-width:44px;min-height:44px;border-radius:4px;background:none;border:none;display:flex;align-items:center;justify-content:center}
.ex-name-wrap:hover .edit-icon{opacity:1}
.edit-icon:hover{color:var(--gold)}
.ex-target{font-size:15px;color:var(--gold-hi);font-weight:600;white-space:nowrap}
.ex-rest{font-size:15px;color:var(--gold-hi);font-weight:600;white-space:nowrap}
.ex-1rm{font-size:11px;color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.day-duration{font-size:11px;color:var(--easy);font-weight:700;white-space:nowrap;display:block;margin-top:2px}
.prev-ref{font-size:12px;color:var(--text);font-style:italic;margin-bottom:6px}
.prog-suggestion{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.prog-suggestion svg{flex-shrink:0;opacity:.8}
.effort-history{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.effort-history-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);flex-shrink:0;margin-right:2px}
.effort-week{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:12px;white-space:nowrap}

/* Sets */
.sets-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.set-row{background:var(--s2);border-radius:var(--rs);padding:12px 14px;border:1px solid var(--border)}
.set-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text);min-width:42px;letter-spacing:.5px;text-transform:uppercase}
.set-inputs{display:flex;gap:8px;flex:1}
.inp-group{flex:1}
.inp-group label{font-size:12px;color:var(--text);font-weight:700;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:4px}
.inp-group input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;font-weight:700;padding:9px 8px;text-align:center;outline:none;-moz-appearance:textfield;transition:border-color .15s}
.inp-group input::-webkit-outer-spin-button,.inp-group input::-webkit-inner-spin-button{-webkit-appearance:none}
.inp-group input:focus{border-color:var(--accent);background:var(--bg)}
.bw-mode .inp-group input{font-size:15px;padding:9px 4px}
.del-btn{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:10px;min-width:44px;min-height:44px;line-height:1;transition:color .15s;display:flex;align-items:center;justify-content:center}
.del-btn:hover{color:var(--hard)}
.bw-total{font-size:12px;font-weight:700;color:var(--gold-hi);white-space:nowrap;align-self:flex-end;padding-bottom:9px;flex-shrink:0}
.bw-btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0}
.bw-btn:hover{border-color:var(--accent-mid);color:var(--accent)}
.bw-btn.bw-active{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-bg)}
.set-bottom{display:flex;flex-direction:column;gap:6px}
.set-bottom-row{display:flex;align-items:center;gap:8px}
.grp-label{font-size:11px;color:var(--text);font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;width:42px;flex-shrink:0}
.btn-grp{display:flex;gap:4px;flex:1}
.ebtn,.abtn{flex:1;border:1px solid var(--border);background:var(--s1);color:var(--text);border-radius:6px;padding:10px 2px;min-height:44px;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;white-space:nowrap}
.ebtn:hover,.abtn:hover{border-color:var(--text);color:var(--text)}
.ebtn.sel-easy{background:var(--easy);color:#000;border-color:var(--easy)}
.ebtn.sel-moderate{background:var(--moderate);color:#000;border-color:var(--moderate)}
.ebtn.sel-hard{background:var(--hard);color:#fff;border-color:var(--hard)}
.abtn.sel-increase{background:var(--increase);color:#fff;border-color:var(--increase)}
.abtn.sel-same{background:var(--same);color:#fff;border-color:var(--same)}
.abtn.sel-decrease{background:var(--decrease);color:#fff;border-color:var(--decrease)}

/* Add set */
.add-set-btn{width:100%;background:none;border:1px dashed var(--border);color:var(--accent);border-radius:var(--rs);padding:10px;min-height:44px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.add-set-btn:hover{background:var(--accent-bg);border-color:var(--accent-mid);border-style:solid}
.set-note-row{padding:5px 0 2px}
.set-note-trigger{font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;padding:2px 0;transition:color .15s}
.set-note-trigger:hover{color:var(--gold-mid)}
.set-note-input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;font-family:'Barlow',sans-serif}
.set-note-input:focus{border-color:var(--accent)}

/* Add exercise */
.add-exercise-btn{width:100%;background:none;border:1px dashed var(--gold-mid);color:var(--gold-mid);border-radius:var(--rs);padding:11px;min-height:44px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
.add-exercise-btn:hover{border-color:var(--gold);color:var(--gold)}
.add-ex-form{display:flex;align-items:center;gap:8px;padding:10px 18px 4px;margin-top:4px}
.add-ex-input{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;padding:8px 12px;outline:none}
.add-ex-input:focus{border-color:var(--accent)}

/* Apnea block */
.apnea-block{padding:14px 18px;border-top:1px solid var(--gold-lo)}
.apnea-header{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.3px;color:var(--gold-hi);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-user-select:none;margin:-4px;padding:4px;min-height:44px;border-radius:6px;transition:background .15s}
.apnea-header:hover{background:var(--gold-lo)}
.apnea-chevron{color:var(--gold-hi);font-size:16px;transition:transform .2s;line-height:1;transform:rotate(90deg)}
.apnea-block.apnea-collapsed .apnea-chevron{transform:rotate(0deg)}
.apnea-body{margin-top:10px;display:block}
.apnea-block.apnea-collapsed .apnea-body{display:none}
.apnea-sub-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:12px 0 6px}
.apnea-row{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;margin-bottom:5px;display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap}
.apnea-round-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gold-hi);min-width:60px;align-self:flex-end;padding-bottom:2px;letter-spacing:.5px;text-transform:uppercase}
.apnea-targets{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding-bottom:2px}
.apnea-target{font-size:13px;color:var(--text);font-style:normal;white-space:nowrap}
.apnea-inp{display:flex;flex-direction:column;gap:3px}
.apnea-inp label{font-size:11px;color:var(--text);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.apnea-inp input{background:var(--s1);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:16px;font-weight:600;padding:7px 8px;outline:none;width:80px;text-align:center;-moz-appearance:textfield;transition:border-color .15s}
.apnea-inp input::-webkit-outer-spin-button,.apnea-inp input::-webkit-inner-spin-button{-webkit-appearance:none}
.apnea-inp input:focus{border-color:var(--accent)}
.apnea-inp input[data-apnea-field="notes"]{width:260px;text-align:left}

/* Raw text */
.raw-section{margin-top:18px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.raw-toggle{padding:11px 16px;cursor:pointer;background:var(--s1);font-size:13px;color:var(--text);display:flex;align-items:center;gap:7px;user-select:none}
.raw-toggle:hover{color:var(--text)}
.raw-toggle svg{transition:transform .2s}
.raw-section.open .raw-toggle svg{transform:rotate(90deg)}
.raw-content{display:none;padding:14px;font-family:'SF Mono','Courier New',monospace;font-size:12px;line-height:1.6;color:var(--muted);white-space:pre-wrap;word-break:break-word;max-height:360px;overflow-y:auto;background:var(--bg)}
.raw-section.open .raw-content{display:block}

/* Main tabs */
.main-tabs{display:flex;background:var(--s2);border-radius:var(--rs);padding:3px;gap:3px;margin-bottom:22px}
.main-tab{flex:1;border:none;border-radius:5px;padding:9px 0;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;background:none;color:var(--text);letter-spacing:.3px;white-space:nowrap}
.main-tab.active{background:var(--s1);color:var(--accent);border:1px solid var(--accent-mid)}

/* Apnea Analytics */
.apnea-analytics{display:flex;flex-direction:column;gap:16px}
.aa-panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.aa-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;-webkit-user-select:none}
.aa-panel-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.8px}
.aa-panel-chevron{color:var(--muted);font-size:16px;transition:transform .2s;display:inline-block}
.aa-panel.aa-collapsed .aa-panel-chevron{transform:rotate(-90deg)}
.aa-panel.aa-collapsed .aa-panel-body{display:none}
.aa-panel-body{padding:0 18px 18px}
.aa-empty{font-size:13px;color:var(--muted);padding:8px 0 4px;font-style:italic}
.aa-charts{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.aa-chart-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 10px 6px}
.aa-chart-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.aa-chart-best{font-size:11px;font-weight:700;margin-top:5px}
.aa-chart-week{font-size:10px;color:var(--muted)}
.aa-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.aa-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.aa-table th:not(:first-child){text-align:right}
.aa-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);vertical-align:middle}
.aa-table td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.aa-table tr:hover td{background:rgba(255,255,255,.03)}
.aa-best{color:var(--easy);font-weight:700}

/* Fitness Tests */
.ft-form{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:24px}
.ft-form-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:14px}
.ft-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ft-field{display:flex;flex-direction:column;gap:4px}
.ft-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text)}
.ft-field input{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:16px;font-weight:600;padding:8px 10px;outline:none;width:100%;-moz-appearance:textfield;transition:border-color .15s}
.ft-field input::-webkit-outer-spin-button,.ft-field input::-webkit-inner-spin-button{-webkit-appearance:none}
.ft-field input:focus{border-color:var(--accent)}
.ft-field.ft-date-field{grid-column:1/-1}
.ft-form-btns{display:flex;gap:10px;margin-top:16px}
.ft-table{width:100%;border-collapse:collapse;font-size:12px}
.ft-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.ft-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;white-space:nowrap}
.ft-table tr:first-child td{background:rgba(0,161,224,.05)}
.ft-table tr:hover td{background:var(--s2)}
.ft-pr{color:var(--gold-hi);font-weight:800}
.ft-pr-badge{display:inline-block;background:var(--gold-lo);border:1px solid var(--gold-mid);color:var(--gold-hi);font-size:10px;font-weight:800;border-radius:4px;padding:1px 6px;margin-left:4px;letter-spacing:.3px;vertical-align:middle}
.ft-delta-pos{color:var(--easy);font-size:11px;font-weight:700}
.ft-delta-neg{color:var(--hard);font-size:11px;font-weight:700}
.ft-delta-neu{color:var(--muted);font-size:11px}
.ft-session{background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;overflow:hidden}
.ft-session-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;user-select:none;transition:background .15s}
.ft-session-header:hover{background:var(--s2)}
.ft-session-date{font-size:14px;font-weight:700;color:var(--text)}
.ft-session-summary{font-size:12px;color:var(--text);margin-left:10px;flex:1}
.ft-session-chevron{color:var(--text);font-size:18px;transition:transform .2s;line-height:1;flex-shrink:0}
.ft-session.open .ft-session-chevron{transform:rotate(90deg)}
.ft-session-body{display:none;padding:0 16px 14px}
.ft-session.open .ft-session-body{display:block}
.ft-empty{text-align:center;padding:40px 0;color:var(--muted);font-size:14px}
.ft-targets{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:22px}
.ft-targets-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text);margin-bottom:14px}
.ft-progress-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
@media(max-width:600px){.ft-progress-row{grid-template-columns:1fr}}
.ft-progress-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px}
.ft-progress-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.ft-progress-bar-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin-bottom:7px;overflow:hidden}
.ft-progress-bar{height:100%;border-radius:3px;transition:width .4s ease}
.ft-progress-meta{display:flex;justify-content:space-between;align-items:baseline;gap:6px;flex-wrap:wrap}
.ft-progress-current{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.ft-progress-tier{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
.ft-progress-next{font-size:11px;color:var(--muted);margin-top:3px}
.ft-tier-none{color:var(--muted);background:rgba(255,255,255,.06)}
.ft-tier-baseline{color:var(--dim);background:rgba(100,116,139,.15)}
.ft-tier-m1{color:var(--accent);background:rgba(0,161,224,.12)}
.ft-tier-m3{color:var(--gold-hi);background:rgba(250,204,21,.12)}
.ft-targets-table{width:100%;border-collapse:collapse;font-size:13px}
.ft-targets-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:6px 12px;text-align:left;border-bottom:1px solid var(--border)}
.ft-targets-table th:not(:first-child){text-align:right}
.ft-targets-table td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);vertical-align:middle}
.ft-targets-table tr:last-child td{border-bottom:none}
.ft-targets-table td:first-child{color:var(--text);font-weight:600}
.ft-targets-table td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.ft-targets-table .ft-t-baseline{color:var(--dim)}
.ft-targets-table .ft-t-m1{color:var(--accent)}
.ft-targets-table .ft-t-m3{color:var(--gold-hi)}

/* History */
.history-section{margin-top:28px}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin-bottom:10px}
.hist-week{background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s}
.hist-week:hover{background:var(--s2);border-color:var(--accent-mid)}
.hist-label{font-size:14px;font-weight:700;color:var(--text)}
.hist-meta{font-size:12px;color:var(--text)}
.hist-current{border-color:var(--accent);background:var(--accent-bg)}
.hist-current .hist-label{color:var(--accent)}
.hist-del{background:none;border:1px solid var(--border);color:var(--dim);border-radius:var(--rs);padding:10px 14px;min-height:44px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0}
.hist-del:hover{border-color:var(--hard);color:var(--hard)}
.fill-last-btn{background:none;border:1px solid var(--gold-mid);color:var(--gold-mid);border-radius:var(--rs);padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.fill-last-btn:hover{border-color:var(--gold);color:var(--gold)}
.workout-actions{display:flex;justify-content:flex-end;margin-top:6px;margin-bottom:18px}
.delete-workout-btn{background:none;border:1px solid var(--border);color:var(--dim);border-radius:var(--rs);padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.delete-workout-btn:hover{border-color:var(--hard);color:var(--hard)}
.week-note-wrap{margin-bottom:18px}
.week-note-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin-bottom:5px}
.week-note-input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:9px 12px;resize:vertical;min-height:54px;outline:none;transition:border-color .15s;line-height:1.5;box-sizing:border-box}
.week-note-input:focus{border-color:var(--accent-mid)}
.week-note-input::placeholder{color:var(--dim)}
.hist-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.btn-delete{background:var(--hard);color:#fff;border-color:var(--hard)!important}


/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s1);border:1px solid var(--accent-mid);color:var(--text);padding:10px 20px;border-radius:24px;font-size:14px;font-weight:600;z-index:1000;transition:transform .3s ease;pointer-events:none;letter-spacing:.2px}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Scroll button */
.scroll-btn{position:fixed;bottom:max(28px,env(safe-area-inset-bottom));right:18px;width:34px;height:34px;border-radius:50%;background:var(--s2);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s,border-color .15s,color .15s}
.scroll-btn.visible{opacity:1;pointer-events:auto}
.scroll-btn:hover{border-color:var(--accent-mid);color:var(--accent)}

/* Misc */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px}
#file-input{display:none}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:28px;max-width:340px;width:100%;text-align:center}
.confirm-box h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase}
.confirm-box p{font-size:14px;color:var(--text);margin-bottom:22px;line-height:1.6}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:11px;border-radius:var(--rs);font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-cancel{background:var(--s2);color:var(--text)}
.btn-confirm{background:var(--accent);color:#fff}
.btn-confirm:hover{background:#0090cc}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:var(--rs);padding:5px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;flex-shrink:0}
.refresh-btn:hover{border-color:var(--accent-mid);color:var(--accent)}
@keyframes spin-once{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.refresh-btn.spinning svg{animation:spin-once 0.4s ease}
.today-btn{background:none;border:1px solid var(--accent-mid);color:var(--accent);border-radius:var(--rs);padding:4px 7px;width:auto;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;margin-left:10px;display:flex;align-items:center;justify-content:center}
.today-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.cal-home-btn{background:none;border:1px solid var(--accent-mid);color:var(--accent);width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cal-home-btn:hover{border-color:var(--accent);background:var(--accent-bg)}

/* Day warmup info button */
.day-info-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:2px 4px;border-radius:4px;display:flex;align-items:center;flex-shrink:0;font-size:14px;line-height:1;transition:color .15s}
.day-info-btn:hover{color:var(--accent)}
.day-del-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:2px 4px;border-radius:4px;display:flex;align-items:center;flex-shrink:0;line-height:1;transition:color .15s}
.day-del-btn:hover{color:var(--hard)}

/* Exercise info modal */
.ex-info-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:2px 4px;border-radius:4px;display:flex;align-items:center;flex-shrink:0;font-size:14px;line-height:1;transition:color .15s}
.ex-info-btn:hover{color:var(--accent)}
.ex-info-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:24px 26px;max-width:540px;width:100%;max-height:80vh;overflow-y:auto;text-align:left}
.ex-info-box h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gold-hi);margin-bottom:16px}
.ex-info-section{margin-bottom:14px}
.ex-info-label{font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text);margin-bottom:5px}
.ex-info-text{font-size:26px;color:var(--text);line-height:1.7}
.ex-info-hold{background:rgba(0,161,224,.08);border:1px solid rgba(0,161,224,.25);border-radius:var(--rs);padding:10px 14px;margin-bottom:14px}
.ex-info-hold .ex-info-label{color:var(--accent)}
.ex-info-hold .ex-info-text{color:rgba(0,161,224,.9)}
.ex-info-meta{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.ex-info-chip{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--text)}

/* Custom tooltips — bright white, replaces native title tooltips on icon buttons */
.day-info-btn,.day-del-btn,.ex-info-btn,.ex-del-btn,.ex-collapse-btn,.edit-icon,.day-date-btn{position:relative}
.day-info-btn[data-tooltip]::after,.day-del-btn[data-tooltip]::after,.ex-info-btn[data-tooltip]::after,.ex-del-btn[data-tooltip]::after,.ex-collapse-btn[data-tooltip]::after,.edit-icon[data-tooltip]::after,.day-date-btn[data-tooltip]::after{
  content:attr(data-tooltip);
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,.18);
  color:#ffffff;
  font-size:12px;
  font-weight:600;
  font-family:'Barlow',sans-serif;
  letter-spacing:.2px;
  white-space:nowrap;
  padding:5px 10px;
  border-radius:6px;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  z-index:50;
}
.day-info-btn[data-tooltip]:hover::after,.day-del-btn[data-tooltip]:hover::after,.ex-info-btn[data-tooltip]:hover::after,.ex-del-btn[data-tooltip]:hover::after,.ex-collapse-btn[data-tooltip]:hover::after,.edit-icon[data-tooltip]:hover::after,.day-date-btn[data-tooltip]:hover::after,
.day-info-btn.tooltip-visible::after,.day-del-btn.tooltip-visible::after,.ex-info-btn.tooltip-visible::after,.ex-del-btn.tooltip-visible::after,.ex-collapse-btn.tooltip-visible::after,.edit-icon.tooltip-visible::after,.day-date-btn.tooltip-visible::after{opacity:1}

/* iOS touch behavior */
button,svg,img{-webkit-touch-callout:none}
.log-query-toggle,.ft-session-header,.raw-toggle{-webkit-user-select:none;user-select:none}

/* Focus ring for keyboard/switch navigation */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* Ensure set note input is 16px to prevent iOS zoom */
.set-note-input{font-size:16px}

@media(max-width:768px){
  main{padding:12px 14px;overflow-x:hidden}
  .set-inputs{gap:6px}
  .set-row{padding:14px}
  .timer-display{font-size:56px}
  .day-header{padding:12px 14px;gap:8px}
  .apnea-row{gap:6px}
  .apnea-inp input{width:70px}
  #week-label{font-size:11px;min-width:80px}
  header h1{display:none}
  header{gap:5px;padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right));min-height:52px}
  .week-nav{gap:3px}
  .week-nav button{width:28px;height:28px;font-size:16px}
  .export-btn{padding:5px 8px}
  .upload-btn{padding:5px 8px;display:flex;align-items:center}
  .upload-btn-label{display:none}
}

/* Touch devices: show hover-hidden elements always, enable tap tooltips */
@media(hover:none){
  .ex-del-btn{opacity:1}
  .edit-icon{opacity:1}
  .cd-preset .preset-del{display:flex}
  .day-info-btn[data-tooltip]::after,.day-del-btn[data-tooltip]::after,.ex-info-btn[data-tooltip]::after,
  .ex-del-btn[data-tooltip]::after,.ex-collapse-btn[data-tooltip]::after,
  .edit-icon[data-tooltip]::after,.day-date-btn[data-tooltip]::after{transition:none}
}
</style>
</head>
<body>
<input type="file" id="file-input" accept=".json,application/json">
<header>
  <h1>Workouts</h1>
  <div class="week-nav">
    <button onclick="navWeek(-1)" aria-label="Previous week">‹</button>
    <span id="week-label"></span>
    <button onclick="navWeek(1)" aria-label="Next week">›</button>
    <button id="today-btn" class="today-btn" onclick="jumpToWeek(toKey(new Date()))" aria-label="Go to current week"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></button>
  </div>
  <button class="export-btn" onclick="pushToCloud()" title="Push to cloud" aria-label="Push to cloud">↑</button>
  <button class="export-btn" onclick="pullFromCloud()" title="Pull from cloud" aria-label="Pull from cloud">↓</button>
  <span id="sync-status" style="font-size:11px;color:var(--text);white-space:nowrap"></span>
  <button class="refresh-btn" title="Refresh" aria-label="Refresh" onclick="handleRefresh(this)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23,4 23,10 17,10"/>
      <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
    </svg>
  </button>
  <button id="export-btn" class="export-btn" onclick="exportCSV()" title="Export to CSV" aria-label="Export to CSV" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7,10 12,15 17,10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>
  <button class="upload-btn" onclick="triggerUpload()" title="Upload JSON" aria-label="Upload JSON"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span class="upload-btn-label"> Upload JSON</span></button>
</header>
<div class="app-layout">
  <aside class="cal-sidebar" id="cal-sidebar" role="complementary"></aside>
  <main id="main" role="main"></main>
</div>
<div class="toast" id="toast" aria-live="polite"></div>
<button class="scroll-btn" id="scroll-btn" onclick="handleScrollBtn()" aria-label="Scroll"></button>

<script>
// ── State ────────────────────────────────────────────────
const STORE = 'wt_v1';
const SUPABASE_URL  = 'https://zeyylhrbflrphazwjuqc.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpleXlsaHJiZmxycGhhendqdXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTgwNzQsImV4cCI6MjA5MzM5NDA3NH0.YPqdpHyRfl21yhC5guCV3OhOGgoJti4j7YYLgpHdppw';
const SUPABASE_USER = 'david';
let weekKey = null; // current week (YYYY-MM-DD of Monday)
let calYear = new Date().getFullYear();
let calMo   = new Date().getMonth(); // 0-indexed
const openDayState = {}; // weekKey → Set of open day indices (in-memory only)
const collapsedExState = {}; // weekKey → Set of collapsed exIds (in-memory only)
let sidebarTab  = 'calendar'; // 'calendar' | 'timer'
let timerMode   = 'stopwatch'; // 'stopwatch' | 'countdown'
let swElapsed   = 0;   let swRunning  = false; let swInterval  = null;
let cdRemaining = 0;   let cdRunning  = false; let cdInterval  = null; let cdPreset = 0; let cdLastDuration = 0; let cdResetOnce = false;
let availableVoices = [];
let audioCtx = null;
let _audioKeepAlive = null;
function _startKeepAlive(ctx) {
  // Always replace — old node may have been stopped by iOS after suspension
  if (_audioKeepAlive) { try { _audioKeepAlive.stop(0); } catch(_) {} }
  const buf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  src.connect(ctx.destination); src.start(0);
  _audioKeepAlive = src;
}
let _speechPrimed = false;
async function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  // Re-start keep-alive after every resume (iOS stops the node when context suspends)
  if (audioCtx.state === 'running') _startKeepAlive(audioCtx);
  // Prime speechSynthesis once per page load inside a user gesture
  if (window.speechSynthesis && !_speechPrimed) {
    _speechPrimed = true;
    const utter = new SpeechSynthesisUtterance('');
    utter.volume = 0;
    window.speechSynthesis.speak(utter);
  }
}
let mainTab = 'workouts'; // 'workouts' | 'apnea' | 'fitness'
const openFtState = new Set(); // open fitness session dates

// ── Date utils ───────────────────────────────────────────
function mondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  d.setHours(0,0,0,0);
  return d;
}
function toKey(date) {
  const d = mondayOf(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function shiftWeek(key, n) {
  const d = new Date(key + 'T12:00:00');
  d.setDate(d.getDate() + n*7);
  return toKey(d);
}
function weekLabel(key) {
  const mon = new Date(key + 'T12:00:00');
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const f = (d,opts) => d.toLocaleDateString('en-US', opts);
  const mStr = f(mon, {month:'short',day:'numeric'});
  const sDay = sun.getDate();
  const sMon = mon.getMonth() !== sun.getMonth() ? ' '+f(sun,{month:'short'}) : '';
  return `${mStr} – ${sDay}${sMon}`;
}
function isCurrentWeek(key) { return key === toKey(new Date()); }

// ── Storage ──────────────────────────────────────────────
function load() { try { return JSON.parse(localStorage.getItem(STORE)) || {weeks:{}}; } catch { return {weeks:{}}; } }
function save(data) { localStorage.setItem(STORE, JSON.stringify(data)); }

const FT_STORE = 'wt_fitness';
function loadFitness() { try { return JSON.parse(localStorage.getItem(FT_STORE)) || []; } catch { return []; } }
function saveFitness(records) { localStorage.setItem(FT_STORE, JSON.stringify(records)); }

const DAY_STATUS_STORE = 'wt_day_status';
function loadDayStatuses() { try { return JSON.parse(localStorage.getItem(DAY_STATUS_STORE)) || {}; } catch { return {}; } }
function saveDayStatuses(map) { localStorage.setItem(DAY_STATUS_STORE, JSON.stringify(map)); }
function cycleDayStatus(dateStr) {
  const map = loadDayStatuses();
  const cur = map[dateStr];
  if (!cur)            map[dateStr] = 'rest';
  else if (cur === 'rest') map[dateStr] = 'injury';
  else                 delete map[dateStr];
  saveDayStatuses(map);
  renderCalendar();
}
function getWeek(key) { return load().weeks[key] || null; }
function savePlan(key, plan, raw) {
  const data = load();
  if (!data.weeks[key]) data.weeks[key] = {logs:{}};
  data.weeks[key].plan = plan;
  data.weeks[key].raw = raw;
  save(data);
}
function addSetLog(key, exId, setObj) {
  const data = load();
  if (!data.weeks[key]) data.weeks[key] = {logs:{}};
  if (!data.weeks[key].logs) data.weeks[key].logs = {};
  if (!data.weeks[key].logs[exId]) data.weeks[key].logs[exId] = [];
  data.weeks[key].logs[exId].push(setObj);
  save(data);
  return data.weeks[key].logs[exId].length - 1;
}
function updateSetLog(key, exId, idx, field, val) {
  const data = load();
  if (data.weeks[key]?.logs?.[exId]?.[idx] != null)
    data.weeks[key].logs[exId][idx][field] = val;
  save(data);
}
function updateExerciseName(key, exId, newName) {
  const data = load();
  const week = data.weeks[key];
  if (!week?.plan?.days) return;
  for (const day of week.plan.days) {
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) { ex.name = newName; break; }
  }
  save(data);
}
function deleteSetLog(key, exId, idx) {
  const data = load();
  data.weeks[key]?.logs?.[exId]?.splice(idx, 1);
  save(data);
}
function allWeeks() {
  const data = load();
  return Object.keys(data.weeks).sort().reverse();
}
function saveWeekNote(note) {
  const data = load();
  if (!data.weeks[weekKey]) return;
  data.weeks[weekKey].note = note;
  save(data);
}
function deleteWeek(key) {
  const data = load();
  delete data.weeks[key];
  save(data);
}
function saveApneaLog(wKey, dayIdx, roundKey, field, value) {
  const data = load();
  if (!data.weeks[wKey]) data.weeks[wKey] = {logs:{}, apnea_logs:{}};
  if (!data.weeks[wKey].apnea_logs) data.weeks[wKey].apnea_logs = {};
  const al = data.weeks[wKey].apnea_logs;
  if (!al[dayIdx]) al[dayIdx] = {};
  if (!al[dayIdx][roundKey]) al[dayIdx][roundKey] = {};
  al[dayIdx][roundKey][field] = value;
  save(data);
}
function loadApneaLog(wKey, dayIdx) {
  return load().weeks[wKey]?.apnea_logs?.[dayIdx] || {};
}
function saveBW(wKey, value) {
  const data = load();
  if (!data.weeks[wKey]) data.weeks[wKey] = {logs:{}};
  data.weeks[wKey].bw = value;
  save(data);
}
function loadBW(wKey) {
  return load().weeks[wKey]?.bw ?? '';
}
function getBWMode(exId) {
  const wd = getWeek(weekKey);
  for (const day of wd?.plan?.days || []) {
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) return !!ex.bwMode;
  }
  return false;
}
function _applyToggleBWMode(exId) {
  const data = load();
  if (!data.weeks[weekKey]?.plan?.days) return;
  let foundEx = null;
  for (const day of data.weeks[weekKey].plan.days) {
    foundEx = day.exercises.find(e => e.id === exId);
    if (foundEx) break;
  }
  if (!foundEx) return;
  foundEx.bwMode = !foundEx.bwMode;
  if (!foundEx.bwMode && data.weeks[weekKey].logs?.[exId]) {
    data.weeks[weekKey].logs[exId].forEach(s => { delete s.bw; delete s.bwAdded; });
  }
  save(data);
  const wd = getWeek(weekKey);
  const di       = wd.plan.days.findIndex(day => day.exercises.some(e => e.id === exId));
  const updatedEx = wd.plan.days.reduce((f, day) => f || day.exercises.find(e => e.id === exId), null);
  if (!updatedEx) return;
  const sets    = wd.logs?.[exId] || [];
  const setsList = document.getElementById('sl-' + exId);
  if (!setsList) return;
  const card = setsList.closest('.exercise-card');
  if (!card) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderExercise(di, updatedEx, sets);
  const newCard = tmp.firstElementChild;
  if (collapsedExState[weekKey]?.has(exId)) newCard.classList.add('collapsed');
  card.replaceWith(newCard);
}

function toggleBWMode(exId) {
  const loggedSets = getWeek(weekKey)?.logs?.[exId]?.filter(
    s => Number.isFinite(Number(s.reps)) && Number(s.reps) > 0
  ) || [];
  const turningOff = getBWMode(exId);
  if (loggedSets.length > 0 && turningOff) {
    showConfirm(
      'Remove BW mode?',
      `This will clear the bodyweight/added split from ${loggedSets.length} logged set${loggedSets.length > 1 ? 's' : ''}. Total weight values are kept.`,
      () => _applyToggleBWMode(exId),
      'Remove BW',
      true
    );
  } else {
    _applyToggleBWMode(exId);
  }
}

function addExerciseToDay(di, name) {
  const data = load();
  const day = data.weeks[weekKey]?.plan?.days?.[di];
  if (!day) return null;
  const id = `d${di}_e${day.exercises.length}_custom_${Date.now()}`;
  const ex = { id, name, sets: '', reps: '', custom: true };
  day.exercises.push(ex);
  save(data);
  return ex;
}

function deleteExercise(di, exId) {
  const data = load();
  const day = data.weeks[weekKey]?.plan?.days?.[di];
  if (day) day.exercises = day.exercises.filter(e => e.id !== exId);
  if (data.weeks[weekKey]?.logs) delete data.weeks[weekKey].logs[exId];
  save(data);
}

function deleteDay(di) {
  const data = load();
  const week = data.weeks[weekKey];
  if (!week?.plan?.days) return;
  const day = week.plan.days[di];
  if (!day) return;
  // Remove all logs for every exercise in this day
  if (week.logs) {
    day.exercises.forEach(ex => { delete week.logs[ex.id]; });
  }
  // Remove apnea logs for this day index
  if (week.apnea_logs) delete week.apnea_logs[di];
  // Remove the day from the plan
  week.plan.days.splice(di, 1);
  save(data);
}

function handleDeleteDay(di) {
  const wd = getWeek(weekKey);
  const day = wd?.plan?.days?.[di];
  if (!day) return;
  const logs = wd.logs || {};
  const setCount = day.exercises.reduce((sum, ex) =>
    sum + (logs[ex.id] || []).filter(s => Number.isFinite(Number(s.reps)) && Number(s.reps) > 0).length, 0);
  const detail = setCount > 0 ? ` This will also delete ${setCount} logged set${setCount > 1 ? 's' : ''}.` : '';
  showConfirm(
    'Delete day?',
    `Delete ${day.name}?${detail} This cannot be undone.`,
    () => {
      deleteDay(di);
      document.getElementById('dc' + di)?.remove();
      refreshProgress();
      renderCalendar();
      updateScrollBtn();
    },
    'Delete',
    true
  );
}
function handleDeleteExercise(di, exId, exName) {
  const loggedSets = getWeek(weekKey)?.logs?.[exId]?.filter(s => s.reps !== '' && s.reps !== null && s.reps !== undefined && Number.isFinite(Number(s.reps)) && s.reps > 0).length || 0;
  const setMsg = loggedSets > 0 ? ` This will also remove ${loggedSets} logged set${loggedSets > 1 ? 's' : ''}.` : '';
  showConfirm(
    'Delete exercise?',
    `Delete ${exName}?${setMsg} This cannot be undone.`,
    () => {
      deleteExercise(di, exId);
      document.getElementById('sl-' + exId)?.closest('.exercise-card')?.remove();
      refreshProgress();
      renderCalendar();
    },
    'Delete',
    true
  );
}

// ── JSON parser ──────────────────────────────────────────
function parseJSON(obj) {
  const days = obj?.days || (Array.isArray(obj) ? obj : null);
  if (days) return normalizeDays(days);
  throw new Error('Unrecognized format. Expected { "days": [...] } — see example below.');
}

const DAY_NAMES = ['Day 1 — Push', 'Day 2 — Pull', 'Day 3 — Legs', 'Day 4 — Pool'];
const ROTATION_NAMES = ['Day 5 — Push', 'Day 6 — Pull', 'Day 7 — Legs'];

function normalizeDays(days) {
  return days.map((d, di) => ({
    name: DAY_NAMES[di] ?? `Day ${di + 1}`,
    exercises: normalizeExercises(d.strength || d.exercises || d.workout || [], di)
  })).filter(d => d.exercises.length > 0);
}

function normalizeExercises(exs, di) {
  return exs.map((ex, ei) => ({
    id: `d${di}_e${ei}`,
    name: String(ex.exercise || ex.name || ex.movement || ex.lift || '').trim(),
    sets:  String(ex.sets  ?? ex.num_sets  ?? ex.numSets  ?? ''),
    reps:  String(ex.reps  ?? ex.num_reps  ?? ex.numReps  ?? ex.rep_range ?? '')
  })).filter(ex => ex.name);
}

function groupByDay(exs) {
  const map = new Map();
  exs.forEach(ex => {
    const key = String(ex.day || ex.day_name || ex.session || 'Workout');
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(ex);
  });
  return Array.from(map.entries())
    .map(([name, exercises], di) => ({ name, exercises: normalizeExercises(exercises, di) }))
    .filter(d => d.exercises.length > 0);
}

function applyRotation(days) {
  if (days.length < 3) return days;
  const clones = [0, 1, 2].map((srcIdx, i) => {
    const src = days[srcIdx];
    const di = days.length + i; // 4, 5, 6 (used for unique IDs)
    return {
      name: ROTATION_NAMES[i],
      exercises: src.exercises.map((ex, ei) => ({ ...ex, id: `d${di}_e${ei}` }))
    };
  });
  return [...days, ...clones];
}

// ── HTML helpers ─────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Tokenise an exercise name for fuzzy matching — strips only generic filler words
// so equipment identifiers like "barbell", "db", "kb" are kept as meaningful tokens.
const _exTok = s => String(s).toLowerCase()
  .replace(/[^a-z0-9 ]/g,' ').split(/\s+/)
  .filter(t => t.length > 1 && !['the','a','an','and','or','on','in','at','to','of','for','with','by','from','as','per'].includes(t));
const _exMatch = (a, b) => {
  if (a === b) return true;
  const ta = _exTok(a), tb = _exTok(b);
  if (!ta.length || !tb.length) return false;
  const m = ta.filter(x => tb.some(y => x === y)).length;
  return m / Math.min(ta.length, tb.length) >= 0.8;
};

// ── Calendar ─────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getTypeName(name) {
  const lc = name.toLowerCase();
  if (lc.includes('push'))     return 'Push';
  if (lc.includes('pull'))     return 'Pull';
  if (lc.includes('leg'))      return 'Legs';
  if (lc.includes('pool'))     return 'Pool';
  if (lc.includes('recovery') || lc.includes('cardio')) return 'Cardio';
  return '';
}

function getCalendarData() {
  const data = load();
  const map = new Map(); // 'YYYY-MM-DD' -> { name, logged, total }
  for (const [wk, wData] of Object.entries(data.weeks)) {
    if (!wData.plan?.days) continue;
    const logs = wData.logs || {};
    wData.plan.days.forEach((day, di) => {
      const logged = day.exercises.reduce((sum, ex) =>
        sum + (logs[ex.id] || []).filter(s => Number.isFinite(Number(s.reps)) && Number(s.reps) > 0).length, 0);
      if (logged === 0) return;
      const total = day.exercises.reduce((sum, ex) => sum + (parseInt(ex.sets) || 0), 0);
      const dateKey = resolveDayDate(wk, day, di, logs);
      map.set(dateKey, { name: day.name, logged, total, completed: !!day.completed });
    });
  }
  return map;
}

function renderCalendar() {
  const calData    = getCalendarData();
  const dayStatuses = loadDayStatuses();
  const today    = new Date();
  const todayISO = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const firstOfMonth = new Date(calYear, calMo, 1);
  const daysInMonth  = new Date(calYear, calMo + 1, 0).getDate();
  const startDow     = firstOfMonth.getDay(); // 0 = Sunday

  const dowHtml = ['Su','Mo','Tu','We','Th','Fr','Sa']
    .map(d => `<div class="cal-dow-cell">${d}</div>`).join('');

  let cells = '';
  for (let i = 0; i < startDow; i++) cells += `<div class="cal-cell cal-empty"></div>`;

    const overlayIcon = !entry && dayStatus === 'rest'

function changeCalMonth(n) {
  calMo += n;
  if (calMo > 11) { calMo = 0; calYear++; }
  if (calMo < 0)  { calMo = 11; calYear--; }
  renderCalendar();
}

function jumpToCurrentMonth() {
  calYear = new Date().getFullYear();
  calMo   = new Date().getMonth();
  renderCalendar();
}

function resolveDayDate(wk, day, di, logs) {
  if (day.date) return day.date;
  let latestTs = 0;
  day.exercises.forEach(ex => {
    (logs[ex.id] || []).forEach(s => {
      // only use timestamps from sets that actually have reps logged
      const r = Number(s.reps);
      if (s.ts && s.ts > latestTs && Number.isFinite(r) && r > 0) latestTs = s.ts;
    });
  });
  if (latestTs) {
    const d = new Date(latestTs);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const d = new Date(wk + 'T12:00:00');
  d.setDate(d.getDate() + di);
  return d.toISOString().slice(0, 10);
}

function jumpToDateWeek(dateStr) {
  mainTab = 'workouts';
  // First try the natural week for this date
  let targetWeek = toKey(new Date(dateStr + 'T12:00:00'));
  let targetDi   = -1;
  const tryWeek = (wk) => {
    const wd   = getWeek(wk);
    const days = wd?.plan?.days || [];
    const logs = wd?.logs       || {};
    const di   = days.findIndex((d, i) => resolveDayDate(wk, d, i, logs) === dateStr);
    return di;
  };
  targetDi = tryWeek(targetWeek);
  // If not found, scan all stored weeks for one whose day resolves to this date
  if (targetDi === -1) {
    const data = load();
    for (const wk of Object.keys(data.weeks)) {
      const di = tryWeek(wk);
      if (di !== -1) { targetWeek = wk; targetDi = di; break; }
    }
  }
  weekKey = targetWeek;
  if (targetDi !== -1) {
    openDayState[weekKey] = openDayState[weekKey] || new Set();
    openDayState[weekKey].add(targetDi);
  }
  renderApp();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let cdBellTimeouts = [];
let cdBellNodes = [];
let _alarmEndTime = 0; // wall-clock ms when current countdown should end (for catch-up on foreground)
function cdClearBells() {
  cdBellTimeouts.forEach(clearTimeout); cdBellTimeouts = [];
  cdBellNodes.forEach(n => { try { n.stop(0); } catch(_) {} }); cdBellNodes = [];
  _alarmEndTime = 0;
}
function _playBellImmediate(ctx, offsetSec) {
  // offsetSec: how far ahead (in audio-clock seconds) to schedule the note
  const t = ctx.currentTime + (offsetSec || 0.02);
  const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator(), gain = ctx.createGain();
  osc1.type = 'sine'; osc1.frequency.setValueAtTime(880,  t);
  osc2.type = 'sine'; osc2.frequency.setValueAtTime(1108, t);
  gain.gain.setValueAtTime(0.5, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
  osc1.start(t); osc2.start(t);
  osc1.stop(t + 0.6); osc2.stop(t + 0.6);
  cdBellNodes.push(osc1, osc2);
}
function playBellNow() {
  if (!audioCtx) return;
  if (audioCtx.state === 'running') {
    _playBellImmediate(audioCtx, 0.02);
    return;
  }
  // Context suspended (backgrounded) — resume first, then play with larger offset
  // to ensure the audio pipeline is live before the note is scheduled
  audioCtx.resume().then(() => {
    if (audioCtx.state === 'running') {
      _startKeepAlive(audioCtx);
      _playBellImmediate(audioCtx, 0.1);
    }
  }).catch(() => {});
}
function cdScheduleAll(remaining) {
  cdClearBells();
  _alarmEndTime = Date.now() + remaining;
  // Schedule countdown bells and speech via wall-clock setTimeout so they are
  // immune to AudioContext clock drift right after resume on iOS.
  [3000, 2000, 1000].forEach(mark => {
    const delay = remaining - mark;
    if (delay >= -100) {
      cdBellTimeouts.push(setTimeout(() => playBellNow(), Math.max(0, delay)));
    }
  });
  // Buzzer + haptic + speech at zero
  const speakDelay = Math.max(0, remaining);
  cdBellTimeouts.push(setTimeout(() => {
    if (navigator.vibrate) navigator.vibrate([100, 80, 100, 80, 100]);
    if (audioCtx) {
      const ctx = audioCtx;
      const resume = ctx.state !== 'running' ? ctx.resume() : Promise.resolve();
      resume.then(() => {
        const t = ctx.currentTime + 0.05;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, t);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t); osc.stop(t + 1.0);
        cdBellNodes.push(osc);
      }).catch(() => {});
    }
    speakBreathe();
    _alarmEndTime = 0;
  }, speakDelay));
  // UI reset 4s after end
  cdBellTimeouts.push(setTimeout(() => {
    if (cdLastDuration > 0) {
      cdRemaining = cdLastDuration;
      cdResetOnce = false;
      updateTimerDisplay();
      renderSidebar();
    }
  }, speakDelay + 4000));
}
function cdOnTick(startAt, startRem) {
  cdRemaining = Math.max(0, startRem - (Date.now() - startAt));
  updateTimerDisplay();
  if (cdRemaining <= 0) {
    clearInterval(cdInterval); cdInterval = null; cdRunning = false;
    renderSidebar();
  }
}
async function cdSetPreset(ms) {
  await unlockAudio();
  clearInterval(cdInterval); cdInterval = null; cdRunning = false;
  cdClearBells();
  cdResetOnce = false;
  cdLastDuration = ms; cdPreset = ms; cdRemaining = ms;
  cdRunning = true;
  const startAt = Date.now(), startRem = ms;
  cdScheduleAll(ms);
  cdInterval = setInterval(() => cdOnTick(startAt, startRem), 100);
  renderSidebar();
}
async function cdToggle() {
  await unlockAudio();
  if (cdRunning) {
    clearInterval(cdInterval); cdInterval = null; cdRunning = false;
    cdClearBells();
  } else {
    if (cdRemaining <= 0) return;
    cdResetOnce = false;
    cdRunning = true;
    const startAt = Date.now(), startRem = cdRemaining;
    cdScheduleAll(cdRemaining);
    cdInterval = setInterval(() => cdOnTick(startAt, startRem), 100);
  }
  renderSidebar();
}
function cdReset() {
  if (cdRunning) {
    clearInterval(cdInterval); cdInterval = null; cdRunning = false;
  }
  cdClearBells();
  if (!cdResetOnce && cdLastDuration > 0) {
    cdRemaining = cdLastDuration;
    cdResetOnce = true;
  } else {
    cdRemaining = 0; cdLastDuration = 0; cdPreset = 0; cdResetOnce = false;
    document.querySelectorAll('.cd-preset').forEach(b => b.classList.remove('active'));
  }
  updateTimerDisplay();
  renderSidebar();
}

async function cdSetCustom() {
  await unlockAudio();
  const m  = Math.max(0, parseInt(document.getElementById('cd-custom-m')?.value) || 0);
  const s  = Math.max(0, Math.min(59, parseInt(document.getElementById('cd-custom-s')?.value) || 0));
  const ms = (m * 60 + s) * 1000;
  if (ms <= 0) return;
  clearInterval(cdInterval); cdInterval = null; cdRunning = false;
  cdResetOnce = false;
  cdLastDuration = ms; cdPreset = 0; cdRemaining = ms;
  renderSidebar();
}
function showAddPresetForm() {
  const minInput = document.getElementById('cd-custom-m');
  const secInput = document.getElementById('cd-custom-s');
  const minVal = parseInt(minInput?.value) || 0;

  const customMs = (minVal * 60 + secVal) * 1000;
  const presetMs = customMs > 0 ? customMs : cdLastDuration;
  if (presetMs === 0) { toast('Set a time first'); return; }
  cdLastDuration = presetMs; cdResetOnce = false;
  const btn = document.getElementById('cd-add-preset-btn');
  if (!btn) return;
  const label = fmtCD(presetMs).replace(/^0/, '');
  const form = document.createElement('div');
  form.id = 'cd-add-preset-btn';
  form.style.cssText = 'display:flex;align-items:center;gap:6px;margin-top:6px';

function confirmAddPreset() {
  const form = document.getElementById('cd-add-preset-btn');
  if (!form) return;
  const label = form.querySelector('[data-preset-label]')?.value.trim();
  if (!label) return;
  const newPreset = { label, ms: cdLastDuration };
  const insertAt = cdPresets.findIndex(p => p.ms > newPreset.ms);
  if (insertAt === -1) { cdPresets.push(newPreset); } else { cdPresets.splice(insertAt, 0, newPreset); }
  savePresets();
  renderSidebar();
}
function cdDeletePreset(i) {
  if (cdPresets.length <= 1) return;
  showConfirm('Delete preset?', `Delete "${cdPresets[i].label}"? This cannot be undone.`, () => {
    if (cdPreset === cdPresets[i].ms) cdPreset = 0;
    cdPresets.splice(i, 1);
    savePresets();
    renderSidebar();
  }, 'Delete', true);
}

function uiFeedback() {
  if (navigator.vibrate) navigator.vibrate(30);
  try {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const ctx = audioCtx;
    const t = ctx.currentTime + 0.015;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1480, t);
    osc.frequency.exponentialRampToValueAtTime(1760, t + 0.08);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.25);
  } catch(_) {}
}
function playOneBell() {
  try {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const ctx = audioCtx;
    const t = ctx.currentTime + 0.015;
    const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator(), gain = ctx.createGain();
    osc1.type = 'sine'; osc1.frequency.setValueAtTime(880,  t);
    osc2.type = 'sine'; osc2.frequency.setValueAtTime(1108, t);
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
    osc1.start(t); osc2.start(t);
    osc1.stop(t + 0.6); osc2.stop(t + 0.6);
  } catch(e) {}
}
function speakBreathe() {
  // Re-query voices at call time — may have loaded since page init
  const voices = window.speechSynthesis.getVoices();
  if (voices.length) availableVoices = voices;
  const utter = new SpeechSynthesisUtterance('Breathe in');
  utter.pitch = 1.0; utter.rate = 0.7; utter.volume = 1;
  // Prefer high-quality neural/Siri voices on iOS, then fall back
  const female = availableVoices.find(v => v.name === 'Siri voice 2')
    || availableVoices.find(v => v.name === 'Samantha (Enhanced)')
    || availableVoices.find(v => v.name === 'Ava (Enhanced)')
    || availableVoices.find(v => v.name.includes('Siri') && v.lang.startsWith('en'))
    || availableVoices.find(v => v.name.includes('Samantha'))
    || availableVoices.find(v => v.name.includes('Ava'))
    || availableVoices.find(v => v.name.includes('Allison'))
    || availableVoices.find(v => v.name.includes('Victoria'))
    || availableVoices.find(v => v.name.includes('Karen'))
    || availableVoices.find(v => v.name.toLowerCase().includes('female') && v.lang.startsWith('en'))
    || availableVoices.find(v => v.lang === 'en-US')
    || availableVoices[0];
  if (female) utter.voice = female;
  // iOS sometimes pauses speech synthesis — kick it before speaking
  if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  window.speechSynthesis.speak(utter);
}

function exportCSV() {
  const data = load();
  const weeks = Object.keys(data.weeks).sort(); // ascending chronological
  const q = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const effortLabel = e => e === 'easy' ? 'Easy' : e === 'moderate' ? 'Moderate' : e === 'hard' ? 'Hard' : '';
  const MAX_MS = 3 * 60 * 60 * 1000;
  const dayDurationMin = (day, logs) => {
    if (!day?.completed || !day.completedAt) return '';
    let start = null;
    if (day.startedAt && day.startedAt < day.completedAt && (day.completedAt - day.startedAt) <= MAX_MS)
      start = day.startedAt;
    if (start === null) {
      let earliest = day.completedAt;
      day.exercises.forEach(ex => {
        (logs[ex.id] || []).forEach(s => {
          const r = Number(s.reps);
          if (s.ts && s.ts < earliest && Number.isFinite(r) && r > 0 && (day.completedAt - s.ts) <= MAX_MS)
            earliest = s.ts;
        });
      });
      if (earliest < day.completedAt) start = earliest;
    }
    if (start === null) return '';
    return Math.round((day.completedAt - start) / 60000);
  };

  const rows = [['Week','Day','Date','Duration (min)','Exercise','Set #','Weight (lbs)','Reps','Effort','Adjustment'].map(q).join(',')];

  for (const wk of weeks) {
    const wData = data.weeks[wk];
    if (!wData?.plan?.days) continue;
    const logs = wData.logs || {};
    const wLabel = weekLabel(wk);
    wData.plan.days.forEach(day => {
      const dateStr = day.date || '';
      const durMin = dayDurationMin(day, logs);
      day.exercises.forEach(ex => {
        (logs[ex.id] || []).forEach((s, si) => {
          const r = Number(s.reps);
          if (!Number.isFinite(r) || r <= 0) return;
          rows.push([
            wLabel,
            day.name,
            dateStr,
            si === 0 ? durMin : '', // only on the first set row per day to avoid repetition
            ex.name,
            si + 1,
            s.weight !== '' && s.weight != null ? s.weight : '',
            r,
            effortLabel(s.effort),
            s.adjustment || ''
          ].map(q).join(','));
        });
      });
    });
  }

  const blob = new Blob([rows.join('\n')], {type: 'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `workout-log-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  uiFeedback();
}

function daySetCounts(day, logs) {
  const logged = day.exercises.reduce((sum, ex) =>
    sum + (logs[ex.id] || []).filter(s => s.reps !== '' && s.reps !== null && s.reps !== undefined && Number.isFinite(Number(s.reps)) && s.reps > 0).length, 0);
  const total = day.exercises.reduce((sum, ex) => {
    const n = parseInt(ex.sets);
    return sum + (Number.isFinite(n) ? n : 0);
  }, 0);
  return { logged, total };
}

       </div>`
    : `<div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0">
        <span class="day-progress" id="prog${di}">${prog}</span>
        ${durStr ? `<span class="day-duration" id="dur${di}">${durStr}</span>` : `<span class="day-duration" id="dur${di}" style="display:none"></span>`}
       </div>`;

  // Cardio day body: just accordions + apnea block (no exercise list, no add button)
  const dayBody = isCardioDay
    ? `${renderDaySections(day.name)}${renderApneaBlock(di, day.name)}<div class="complete-wrap">${completeBtn}</div>`
    : `${exHtml}<button class="add-exercise-btn" id="add-ex-${di}" onclick="showAddExerciseForm(${di})">+ Add Exercise</button>${renderApneaBlock(di, day.name)}${renderDaySections(day.name)}<div class="complete-wrap">${completeBtn}</div>`;

  return `<div class="day-card" id="dc${di}">
    <div class="day-header" onclick="toggleDay(${di})">
      ${getDayBadge(day.name)}
      ${checkmark}
      <h2>${esc(day.name)}</h2>
      ${warmupBtn}
      ${dayDelBtn}
      <div class="day-date-wrap">
        ${dateDisplay}
        <button class="day-date-btn" onclick="event.stopPropagation()" aria-label="Set date" data-tooltip="Set date">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <input type="date" id="date-${di}" class="day-date-input" value="${dateVal}"
                 onchange="event.stopPropagation();handleDayDate(${di},this.value)"
                 onclick="event.stopPropagation()">
        </button>
      </div>
      ${fillBtn}
      ${progressArea}
      <span class="day-chevron">›</span>
    </div>
    <div class="day-progress-track"><div class="day-progress-fill" id="pb${di}" style="width:${pct}%"></div></div>
    <div class="day-body" id="db${di}">${dayBody}</div>
  </div>`;
}
